<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Control - Plataforma de Gestión DC3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 40%; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Pantalla de Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">ACE Control Login</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Usuario" class="w-full p-3 border rounded">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border rounded">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Entrar</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- Panel Principal (Oculto inicialmente) -->
    <div id="main-panel" class="hidden flex h-screen">
        <!-- Sidebar -->
        <div class="bg-slate-900 text-white w-64 p-6 space-y-6">
            <h1 class="text-2xl font-bold border-b border-slate-700 pb-4">ACE Control</h1>
            <nav class="space-y-4">
                <a href="#" onclick="showSection('dashboard')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Dashboard</a>
                <a href="#" onclick="showSection('workers')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Personal (Excel)</a>
                <a href="#" onclick="showSection('courses')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Cursos</a>
                <a href="#" onclick="showSection('agents')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Agentes Capacitadores</a>
                <a href="#" onclick="logout()" class="block py-2.5 px-4 rounded transition hover:bg-red-900 text-red-400 mt-10">Cerrar Sesión</a>
            </nav>
        </div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800" id="section-title">Resumen</h2>
                <div class="flex space-x-2">
                    <button id="add-btn" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 hidden" onclick="openModal()">+ Agregar Nuevo</button>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <!-- Seccion de Tablas -->
                <div class="bg-white shadow-md rounded-lg overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50" id="table-header"></thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200 text-sm"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal para Agregar -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4" id="modal-title">Agregar</h3>
            <div id="modal-fields" class="space-y-4"></div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600">Cancelar</button>
                <button onclick="saveNew()" class="px-4 py-2 bg-blue-600 text-white rounded">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const ATLAS_URL = "https://data.mongodb-api.com/app/data-jshze/endpoint/data/v1/action";
        const API_KEY = "al-b14XHfG6V17yJMOy1lmUWm9vCbuLZG1-Ot7Mp0YAMhH";
        const DB_CONFIG = { dataSource: "acecontrol", database: "DC3_Database" };

        let currentSection = 'dashboard';

        function login() {
            // Login básico por ahora
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === '1234') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                showSection('dashboard');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        function showSection(section) {
            currentSection = section;
            const btn = document.getElementById('add-btn');
            btn.classList.add('hidden');

            if(section === 'workers') fetchWorkers();
            else if(section === 'courses') { btn.classList.remove('hidden'); fetchCourses(); }
            else if(section === 'agents') { btn.classList.remove('hidden'); fetchAgents(); }
            else fetchDashboard();
        }

        async function atlasAction(action, collection, payload = {}) {
            const response = await fetch(`${ATLAS_URL}/${action}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "api-key": API_KEY },
                body: JSON.stringify({ ...DB_CONFIG, collection, ...payload })
            });
            return await response.json();
        }

        async function fetchWorkers() {
            document.getElementById('section-title').innerText = "Lista de Personal (Cargado por App)";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Nombre</th><th class="px-6 py-3 text-left">CURP</th><th class="px-6 py-3 text-left">Puesto</th></tr>`;
            const data = await atlasAction("find", "workers", { filter: {} });
            renderTable(data.documents, ['name', 'curp', 'position']);
        }

        async function fetchCourses() {
            document.getElementById('section-title').innerText = "Catálogo de Cursos";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Curso</th><th class="px-6 py-3 text-left">Horas</th><th class="px-6 py-3 text-left">Área</th></tr>`;
            const data = await atlasAction("find", "courses", { filter: {} });
            renderTable(data.documents, ['name', 'durationHours', 'thematicArea']);
        }

        async function fetchAgents() {
            document.getElementById('section-title').innerText = "Agentes Capacitadores";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Nombre</th><th class="px-6 py-3 text-left">Registro STPS</th></tr>`;
            const data = await atlasAction("find", "agents", { filter: {} });
            renderTable(data.documents, ['name', 'stpsRegistry']);
        }

        function renderTable(data, keys) {
            let html = data.map(item => `<tr>${keys.map(k => `<td class="px-6 py-4">${item[k] || ''}</td>`).join('')}</tr>`).join('');
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="3" class="p-4 text-center">No hay datos registrados.</td></tr>';
        }

        function openModal() {
            const fields = document.getElementById('modal-fields');
            if(currentSection === 'courses') {
                document.getElementById('modal-title').innerText = "Nuevo Curso";
                fields.innerHTML = `<input id="f1" placeholder="Nombre del curso" class="w-full p-2 border"><input id="f2" placeholder="Horas" class="w-full p-2 border"><input id="f3" placeholder="Área temática" class="w-full p-2 border">`;
            } else {
                document.getElementById('modal-title').innerText = "Nuevo Agente";
                fields.innerHTML = `<input id="f1" placeholder="Nombre completo" class="w-full p-2 border"><input id="f2" placeholder="Registro STPS" class="w-full p-2 border">`;
            }
            document.getElementById('add-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('add-modal').style.display = 'none'; }

        async function saveNew() {
            let doc = {};
            if(currentSection === 'courses') {
                doc = { name: document.getElementById('f1').value, durationHours: parseInt(document.getElementById('f2').value), thematicArea: document.getElementById('f3').value };
                await atlasAction("insertOne", "courses", { document: doc });
            } else {
                doc = { name: document.getElementById('f1').value, stpsRegistry: document.getElementById('f2').value };
                await atlasAction("insertOne", "agents", { document: doc });
            }
            closeModal();
            showSection(currentSection);
        }
    </script>
</body>
</html>
