<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE-Control | Gestión de Agente Capacitador Externo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #0b1329;
            background-image: radial-gradient(circle at 10% 20%, rgba(30, 41, 59, 0.4) 0%, transparent 80%),
                              radial-gradient(circle at 90% 80%, rgba(29, 78, 216, 0.15) 0%, transparent 70%);
        }
        .nav-btn.active { background-color: #2563eb; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center font-sans antialiased text-slate-200 px-4 overflow-hidden">

    <!-- VIEW: LOGIN (Diseño idéntico a la imagen solicitada) -->
    <div id="view-login" class="w-full max-w-5xl bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row min-h-[600px]">

        <!-- Panel Izquierdo -->
        <div class="w-full md:w-1/2 bg-gradient-to-br from-blue-700 to-indigo-900 p-12 flex flex-col justify-between relative overflow-hidden text-white">
            <div class="absolute -top-40 -left-40 w-96 h-96 bg-sky-400/20 rounded-full blur-3xl"></div>
            <div class="flex items-center space-x-3 z-10 font-bold italic">ACE-CONTROL</div>
            <div class="my-auto py-12 flex flex-col items-center text-center z-10">
                <i data-lucide="shield-check" class="w-20 h-20 text-sky-300 mb-6"></i>
                <h2 class="text-3xl font-black uppercase tracking-widest">SEGURIDAD ACE</h2>
                <p class="mt-2 text-sm opacity-80">Control total de Agentes Capacitadores.</p>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="w-full md:w-1/2 p-12 flex flex-col justify-center bg-white rounded-[3rem] m-4 shadow-2xl">
            <div class="max-w-md w-full mx-auto space-y-8">
                <h3 class="text-2xl font-black text-slate-800 text-center italic uppercase">ACE-CONTROL</h3>
                <form class="space-y-6" onsubmit="login(event)">
                    <input id="email" type="email" required class="w-full bg-slate-100 rounded-xl px-4 py-3 text-slate-900 outline-none" placeholder="Email">
                    <div class="relative">
                        <input id="password" type="password" required class="w-full bg-slate-100 rounded-xl px-4 py-3 text-slate-900 outline-none" placeholder="Password">
                        <i id="eye-icon" onclick="togglePassword()" class="fa-solid fa-eye-slash absolute right-4 top-4 text-slate-400 cursor-pointer"></i>
                    </div>
                    <div class="flex items-center justify-between text-[11px] font-bold text-slate-500">
                        <label class="flex items-center"><input type="checkbox" id="remember-me" class="mr-1"> Registrarse?</label>
                        <a href="#">¿Olvidó su contraseña?</a>
                    </div>
                    <button type="submit" class="w-full bg-[#4262a0] text-white py-4 rounded-2xl font-bold hover:bg-[#36518a]">Entrar</button>
                    <div class="text-center"><a href="#" class="text-[11px] font-bold text-blue-800 hover:underline">Acceder en modo seguro</a></div>
                </form>
                <p id="login-error" class="text-red-500 text-xs text-center hidden">Credenciales Incorrectas</p>
            </div>
        </div>
    </div>

    <!-- VIEW: APP CONTAINER -->
    <div id="app-container" class="hidden fixed inset-0 flex h-screen bg-slate-50 text-slate-800">
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col justify-between shrink-0">
            <div>
                <div class="h-16 flex items-center px-6 border-b border-slate-800 font-bold text-white uppercase italic">A ACE-CONTROL</div>
                <nav class="mt-6 px-4 space-y-1">
                    <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
                    <button onclick="switchView('workers')" id="btn-workers" class="nav-btn w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="file-text"></i><span>Personal (Excel)</span></button>
                    <button onclick="switchView('courses')" id="btn-courses" class="nav-btn w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="book-open"></i><span>Cursos</span></button>
                    <button onclick="switchView('agents')" id="btn-agents" class="nav-btn w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="award"></i><span>Agentes Cap.</span></button>
                    <button onclick="switchView('dc3')" id="btn-dc3" class="nav-btn w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="file-check"></i><span>DC-3 Generados</span></button>
                    <button onclick="switchView('users')" id="btn-users" class="nav-btn hidden w-full flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm"><i data-lucide="users"></i><span>Usuarios</span></button>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-800"><button onclick="logout()" class="w-full text-red-400 p-2 hover:bg-red-900 rounded">Cerrar Sesión</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b flex items-center justify-between px-8">
                <div class="flex items-center space-x-4">
                    <h1 id="page-title" class="text-xl font-bold">Dashboard</h1>
                    <select id="user-filter" onchange="refreshCurrentView()" class="text-sm border rounded p-1">
                        <option value="ALL">Todos los Usuarios</option>
                        <option value="d4r005@gmail.com">Dario Robles</option>
                        <option value="lugga.advisors@gmail.com">Cynthia Garza</option>
                    </select>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right leading-none"><p id="user-name-display" class="font-bold">Dario Robles</p><p class="text-[10px] text-slate-500 uppercase font-black">Administrador ACE</p></div>
                    <div id="user-initials" class="h-10 w-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">DR</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <!-- Secciones Dinámicas -->
                <div id="view-dashboard" class="grid grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">Personal: <span id="stat-workers" class="font-bold">0</span></div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">Cursos: <span id="stat-courses" class="font-bold">0</span></div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">DC-3: <span id="stat-dc3" class="font-bold">0</span></div>
                </div>

                <div id="view-content" class="hidden space-y-4">
                    <div class="flex justify-between items-center">
                        <p id="view-description" class="text-slate-500 text-sm"></p>
                        <div class="flex space-x-2">
                            <input type="file" id="excel-input" class="hidden" onchange="handleExcel(this)">
                            <button id="upload-btn" onclick="document.getElementById('excel-input').click()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold hidden">Cargar Excel</button>
                            <button id="gen-masivo-btn" class="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold hidden">Generar DC-3 Masivo</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl border overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead id="table-header" class="bg-slate-50 uppercase text-[10px] font-bold text-slate-400"></thead>
                            <tbody id="table-body" class="divide-y text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const ATLAS_URL = "https://data.mongodb-api.com/app/data-jshze/endpoint/data/v1/action";
        const API_KEY = "al-b14XHfG6V17yJMOy1lmUWm9vCbuLZG1-Ot7Mp0YAMhH";
        const DB_CONFIG = { dataSource: "acecontrol", database: "DC3_Database" };

        const DATA = {
            users: [
                { name: "Dario Robles", email: "d4r005@gmail.com", role: "ADMIN", password: "Branco2025" },
                { name: "Cynthia Garza Lugo", email: "lugga.advisors@gmail.com", role: "USER", password: "Cynthia123" }
            ],
            courses: [
                { name: "MANEJO SEGURO DE MONTACARGAS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "TRABAJOS EN ALTURA (NOM-009)", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "SEGURIDAD EN SOLDADURA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "FORMACION DE BRIGADAS", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "ESPACIOS CONFINADOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "BLOQUEO Y ETIQUETADO LOTO", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "MATERIALES PELIGROSOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "MAQUINARIA PESADA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "SIMULACROS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "SUPERVISORES SSPA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "CORTE Y BARBERIA", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "MAQUILLAJE", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "FORMACION INSTRUCTORES", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "CONSTRUCCIÓN (NOM-031)", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "MANLIFT", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "ENGANCHE 5 RUEDA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "URGENCIAS MEDICAS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "VEHICULOS PESADOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" },
                { name: "INHALOTERAPIA", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" }
            ],
            agents: [{ name: "CYNTHIA YADIRA GARZA LUGO", stps: "STPS-GALC780523-MP3-005" }]
        };

        let currentUser = null, currentView = 'dashboard';

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = DATA.users.find(u => u.email === email && u.password === pass);
            if(user) { currentUser = user; initApp(); } else { alert("Error!"); }
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = currentUser.name;
            if(currentUser.role === 'ADMIN') document.getElementById('btn-users').classList.remove('hidden');
            switchView('dashboard'); lucide.createIcons();
        }

        async function switchView(v) {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+v).classList.add('active');
            document.getElementById('view-dashboard').classList.toggle('hidden', v !== 'dashboard');
            document.getElementById('view-content').classList.toggle('hidden', v === 'dashboard');
            document.getElementById('upload-btn').classList.toggle('hidden', v !== 'workers');
            document.getElementById('gen-masivo-btn').classList.toggle('hidden', v !== 'workers');
            refreshCurrentView(); lucide.createIcons();
        }

        async function refreshCurrentView() {
            const filterValue = document.getElementById('user-filter').value;
            const filter = (filterValue === 'ALL') ? {} : { creatorEmail: filterValue };

            if(currentView === 'dashboard') {
                const w = await atlasAction("find", "workers", { filter });
                document.getElementById('stat-workers').innerText = w.documents.length || 0;
                document.getElementById('stat-courses').innerText = filterValue === 'ALL' ? DATA.courses.length : DATA.courses.filter(c => c.creatorEmail === filterValue).length;
            } else if(currentView === 'workers') {
                const w = await atlasAction("find", "workers", { filter });
                document.getElementById('table-header').innerHTML = `<tr><th class="p-4">Nombre</th><th class="p-4">CURP</th><th class="p-4">Puesto</th></tr>`;
                document.getElementById('table-body').innerHTML = (w.documents || []).map(x => `<tr><td class="p-4 font-bold">${x.name}</td><td class="p-4">${x.curp}</td><td class="p-4">${x.position}</td></tr>`).join('');
            } else if(currentView === 'courses') {
                const list = filterValue === 'ALL' ? DATA.courses : DATA.courses.filter(c => c.creatorEmail === filterValue);
                document.getElementById('table-header').innerHTML = `<tr><th class="p-4">Curso</th><th class="p-4">Horas</th></tr>`;
                document.getElementById('table-body').innerHTML = list.map(c => `<tr><td class="p-4 font-bold">${c.name}</td><td class="p-4 font-bold text-blue-600">${c.durationHours} hrs</td></tr>`).join('');
            } else if(currentView === 'users') {
                document.getElementById('table-header').innerHTML = `<tr><th class="p-4">Nombre</th><th class="p-4">Email</th><th class="p-4">Rol</th></tr>`;
                document.getElementById('table-body').innerHTML = DATA.users.map(u => `<tr><td class="p-4 font-bold">${u.name}</td><td class="p-4">${u.email}</td><td class="p-4">${u.role}</td></tr>`).join('');
            } else if(currentView === 'agents') {
                document.getElementById('table-header').innerHTML = `<tr><th class="p-4">Nombre</th><th class="p-4">STPS</th></tr>`;
                document.getElementById('table-body').innerHTML = DATA.agents.map(a => `<tr><td class="p-4 font-bold uppercase">${a.name}</td><td class="p-4 text-blue-600 font-bold">${a.stps}</td></tr>`).join('');
            }
        }

        async function atlasAction(action, collection, payload = {}) {
            const r = await fetch(`${ATLAS_URL}/${action}`, { method: "POST", headers: { "Content-Type": "application/json", "api-key": API_KEY }, body: JSON.stringify({ ...DB_CONFIG, collection, ...payload }) });
            return await r.json();
        }
        function togglePassword() { const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'; }
        function logout() { location.reload(); }
        function handleExcel(input) {
            const r = new FileReader(); r.onload = async (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const workers = rows.map(r => ({ name: r.Nombre || r.NOMBRE, curp: r.CURP, position: r.Puesto || r.PUESTO, creatorEmail: currentUser.email }));
                await atlasAction("insertMany", "workers", { documents: workers });
                alert("Excel cargado!"); refreshCurrentView();
            };
            r.readAsArrayBuffer(input.files[0]);
        }
    </script>
</body>
</html>
