    <script>
        const API_URL = "https://data.mongodb-api.com/app/data-jshze/endpoint/data/v1/action";
        const API_KEY = "al-b14XHfG6V17yJMOy1lmUWm9vCbuLZG1-Ot7Mp0YAMhH";
        const DB_CONFIG = { dataSource: "acecontrol", database: "ace-control" };

        const CATALOGS = {
            occupations: ["01 Cultivo, crianza y aprovechamiento", "01.1 Agricultura y silvicultura", "01.2 Ganadería", "01.3 Pesca y acuacultura", "02 Extracción y suministro", "02.1 Exploración", "02.2 Extracción", "02.3 Refinación y beneficio", "02.4 Provisión de energía", "02.5 Provisión de agua", "03 Construcción", "03.1 Planeación y dirección de obras", "03.2 Edificación y urbanización", "03.3 Acabado", "03.4 Instalación y mantenimiento", "04 Tecnología", "04.1 Mecánica", "04.2 Electricidad", "04.3 Electrónica", "04.4 Informática", "04.5 Telecomunicaciones", "04.6 Procesos industriales", "05 Procesamiento y fabricación", "05.1 Minerales no metálicos", "05.2 Metales", "05.3 Alimentos y bebidas", "05.4 Textiles y prendas de vestir", "05.5 Materia orgánica", "05.6 Productos químicos", "05.7 Productos metálicos y de hule y plástico", "05.8 Productos eléctricos y electrónicos", "05.9 Productos impresos", "06 Transporte", "06.1 Ferroviario", "06.2 Autotransporte", "06.3 Aéreo", "06.4 Marítimo y fluvial", "06.5 Servicios de apoyo", "07 Provisión de bienes y servicios", "07.1 Comercio", "07.2 Alimentación y hospedaje", "07.3 Turismo", "07.4 Deporte y esparcimiento", "07.5 Servicios personales", "07.6 Reparación de artículos de uso doméstico y personal", "07.7 Limpieza", "07.8 Servicio postal y mensajería", "08 Gestión y soporte administrativo", "08.1 Bolsa, banca y seguros", "08.2 Administración", "08.3 Servicios legales", "09 Salud y protección social", "09.1 Servicios médicos", "09.2 Inspección sanitaria y del medio ambiente", "09.3 Seguridad social", "09.4 Protección de bienes y/o personas", "10 Comunicación", "10.1 Publicación", "10.2 Radio, cine, televisión y teatro", "10.3 Interpretación artística", "10.4 Traducción e interpretación lingüística", "10.5 Publicidad, propaganda y relaciones públicas", "11 Desarrollo y extensión del conocimiento", "11.1 Investigación", "11.2 Enseñanza", "11.3 Difusión cultural"],
            thematicAreas: ["1000 Producción general", "2000 Servicios", "3000 Administración, contabilidad y economía", "4000 Comercialización", "5000 Mantenimiento y reparación", "6000 Seguridad", "7000 Desarrollo personal y familiar", "8000 Uso de tecnologías de la información y comunicación", "9000 Participación social"]
        };

        const DATA = {
            users: [{ name: "Dario Robles", email: "d4r005@gmail.com", role: "ADMIN", password: "Branco2025" }, { name: "Cynthia Garza Lugo", email: "lugga.advisors@gmail.com", role: "USER", password: "Cynthia123" }],
            courses: [{ name: "MANEJO SEGURO DE MONTACARGAS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "TRABAJOS EN ALTURA (NOM-009)", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "SEGURIDAD EN SOLDADURA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "FORMACION DE BRIGADAS", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" }, { name: "ESPACIOS CONFINADOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "BLOQUEO Y ETIQUETADO LOTO", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "MATERIALES PELIGROSOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "MAQUINARIA PESADA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "SIMULACROS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "SUPERVISORES SSPA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "CORTE Y BARBERIA", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" }, { name: "MAQUILLAJE", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" }, { name: "FORMACION INSTRUCTORES", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "CONSTRUCCIÓN (NOM-031)", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "MANLIFT", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "ENGANCHE 5 RUEDA", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "URGENCIAS MEDICAS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "VEHICULOS PESADOS", durationHours: 8, creatorEmail: "lugga.advisors@gmail.com" }, { name: "INHALOTERAPIA", durationHours: 24, creatorEmail: "lugga.advisors@gmail.com" }],
            agents: [{ name: "CYNTHIA YADIRA GARZA LUGO", stps: "STPS-GALC780523-MP3-005", creatorEmail: "lugga.advisors@gmail.com" }],
            companies: []
        };

        let currentUser = null, currentView = 'dashboard', selectedWorker = null;

        window.onload = function() { lucide.createIcons(); if (localStorage.getItem('rememberedEmail')) document.getElementById('email').value = localStorage.getItem('rememberedEmail'); };

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = DATA.users.find(u => u.email === email && u.password === pass);
            if(user) { if(document.getElementById('remember-me').checked) localStorage.setItem('rememberedEmail', email); currentUser = user; initApp(); } else alert("Acceso denegado");
        }

        async function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = currentUser.name;
            if(currentUser.role === 'ADMIN') document.getElementById('btn-users').classList.remove('hidden');
            const comp = await atlasAction("find", "companies", { filter: {} }); DATA.companies = comp.documents || [];
            switchView('dashboard'); lucide.createIcons();
        }

        async function atlasAction(action, collection, payload = {}) {
            const r = await fetch(API_URL+"/"+action, { method: "POST", headers: { "Content-Type": "application/json", "api-key": API_KEY }, body: JSON.stringify({ ...DB_CONFIG, collection, ...payload }) });
            return await r.json();
        }

        function getFilter() { const v = document.getElementById('user-filter').value; return (currentUser.role==='ADMIN' && v==='ALL') ? {} : { creatorEmail: v === 'ALL' ? currentUser.email : v }; }

        async function switchView(v) {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-'+v); if(btn) btn.classList.add('active');
            document.getElementById('view-dashboard').classList.toggle('hidden', v !== 'dashboard');
            document.getElementById('view-content').classList.toggle('hidden', v === 'dashboard');
            document.getElementById('upload-btn').classList.toggle('hidden', v !== 'workers');
            document.getElementById('add-btn').classList.toggle('hidden', !['courses','agents','users','companies','workers'].includes(v));
            refreshCurrentView(); lucide.createIcons();
        }

        async function refreshCurrentView() {
            const f = getFilter();
            if(currentView === 'dashboard') {
                const w = await atlasAction("find", "workers", { filter: f });
                const d = await atlasAction("find", "dc3_records", { filter: f });
                document.getElementById('stat-workers').innerText = (w.documents || []).length;
                document.getElementById('stat-dc3').innerText = (d.documents || []).length;
                document.getElementById('stat-courses').innerText = f.creatorEmail ? DATA.courses.filter(c => c.creatorEmail === f.creatorEmail).length : DATA.courses.length;
            } else if(currentView === 'workers') {
                const data = await atlasAction("find", "workers", { filter: f });
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Nombre</th><th class="p-6">CURP</th><th class="p-6">Puesto</th><th class="p-6 text-right">Acciones</th></tr>`;
                document.getElementById('table-body').innerHTML = (data.documents || []).map(x => `<tr class="hover:bg-slate-50"><td class="p-5 font-bold">${x.name}</td><td class="p-5">${x.curp}</td><td class="p-5">${x.position}</td><td class="p-5 text-right"><button onclick='openDC3Modal(${JSON.stringify(x)})' class="text-blue-600 font-bold hover:underline">Generar DC-3</button></td></tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center">Sin personal</td></tr>';
            } else if(currentView === 'companies') {
                const data = await atlasAction("find", "companies", { filter: {} }); DATA.companies = data.documents || [];
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Empresa</th><th class="p-6">RFC</th><th class="p-6 text-right">Acciones</th></tr>`;
                document.getElementById('table-body').innerHTML = DATA.companies.map(c => `<tr class="hover:bg-slate-50"><td class="p-5 font-bold">${c.name}</td><td class="p-5">${c.rfc}</td><td class="p-5 text-right"><button onclick="deleteItem('companies', '${c._id}')" class="text-red-500 font-bold">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin empresas</td></tr>';
            } else if(currentView === 'courses') {
                const list = f.creatorEmail ? DATA.courses.filter(c => c.creatorEmail === f.creatorEmail) : DATA.courses;
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Curso</th><th class="p-6">Horas</th></tr>`;
                document.getElementById('table-body').innerHTML = list.map(c => `<tr class="hover:bg-slate-50"><td class="p-5 font-bold uppercase">${c.name}</td><td class="p-5 font-bold text-blue-600">${c.durationHours} H</td></tr>`).join('');
            } else if(currentView === 'agents') {
                const list = f.creatorEmail ? DATA.agents.filter(a => a.creatorEmail === f.creatorEmail) : DATA.agents;
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Agente</th><th class="p-6">STPS</th></tr>`;
                document.getElementById('table-body').innerHTML = list.map(a => `<tr class="hover:bg-slate-50"><td class="p-5 font-bold uppercase">${a.name}</td><td class="p-5 font-bold">${a.stps}</td></tr>`).join('');
            }
        }

        function openModal() {
            const fields = document.getElementById('modal-fields'); document.getElementById('modal').style.display = 'block';
            if(currentView === 'companies') { document.getElementById('modal-title').innerText = "Nueva Empresa"; fields.innerHTML = `<input id="f1" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none"><input id="f2" placeholder="RFC" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none">`; }
            else if(currentView === 'workers') { document.getElementById('modal-title').innerText = "Nuevo Trabajador"; let occ = CATALOGS.occupations.map(o => `<option value="${o}">${o}</option>`).join(''); fields.innerHTML = `<input id="f1" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none"><input id="f2" placeholder="CURP" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none"><select id="f3" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none"><option value="">Ocupación</option>${occ}</select><input id="f4" placeholder="Puesto" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none">`; }
        }

        async function saveItem() {
            let doc = {}, coll = "";
            if(currentView === 'companies') { coll = "companies"; doc = { name: document.getElementById('f1').value, rfc: document.getElementById('f2').value, creatorEmail: currentUser.email }; }
            else if(currentView === 'workers') { coll = "workers"; doc = { name: document.getElementById('f1').value, curp: document.getElementById('f2').value, occupation: document.getElementById('f3').value, position: document.getElementById('f4').value, creatorEmail: currentUser.email }; }
            const res = await atlasAction("insertOne", coll, { document: doc });
            if(res.insertedId) { alert("¡Guardado!"); closeModal(); refreshCurrentView(); } else alert("Error al guardar");
        }

        function openDC3Modal(worker) {
            selectedWorker = worker; document.getElementById('dc3-worker-name').innerText = worker.name;
            document.getElementById('dc3-company').innerHTML = DATA.companies.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            const list = currentUser.role === 'ADMIN' ? DATA.courses : DATA.courses.filter(c => c.creatorEmail === currentUser.email);
            document.getElementById('dc3-course').innerHTML = list.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('dc3-modal').style.display = 'block';
        }

        function generateSingleDC3() {
            const doc = new jspdf.jsPDF(); doc.text("FORMATO DC-3", 105, 20, null, null, "center"); doc.text(`Trabajador: ${selectedWorker.name}`, 20, 40); doc.save(`DC3_${selectedWorker.curp}.pdf`);
            atlasAction("insertOne", "dc3_records", { document: { workerId: selectedWorker.curp, courseName: document.getElementById('dc3-course').value, companyName: document.getElementById('dc3-company').value, startDate: document.getElementById('dc3-start').value, creatorEmail: currentUser.email } });
            alert("¡PDF Generado!"); document.getElementById('dc3-modal').style.display = 'none'; refreshCurrentView();
        }

        function togglePassword() { const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'; }
        function logout() { location.reload(); }
        function closeModal() { document.getElementById('modal').style.display='none'; }
        async function deleteItem(coll, id) { if(confirm("Borrar?")) { await atlasAction("deleteOne", coll, { filter: { _id: { "$oid": id } } }); refreshCurrentView(); } }
        async function handleExcel(input) {
            const r = new FileReader(); r.onload = async (e) => {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type:'array'}).SheetNames[0]]);
                await atlasAction("insertMany", "workers", { documents: rows.map(r => ({ name: r.Nombre || r.NOMBRE, curp: r.CURP, position: r.Puesto || r.PUESTO, creatorEmail: currentUser.email })) });
                alert("Excel cargado!"); refreshCurrentView();
            };
            r.readAsArrayBuffer(input.files[0]);
        }
    </script>
</body>
</html>
