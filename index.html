<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ACE-Control | Gestión de Agente Capacitador Externo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1329; }
        .login-bg { background-color: #0c242c; background-image: radial-gradient(circle at center, #1c454e 0%, #0c242c 100%); }
        .nav-btn.active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 30px; width: 600px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="antialiased text-slate-200 h-screen overflow-hidden">

    <!-- Pantalla de Login -->
    <div id="view-login" class="login-bg min-h-screen flex items-center justify-center px-4">
        <div class="flex max-w-5xl w-full items-center justify-between">
            <div class="hidden lg:flex w-1/2 flex-col items-center">
                <svg viewBox="0 0 100 100" class="w-72 h-72 drop-shadow-[0_0_15px_rgba(34,211,238,0.4)]">
                    <path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
                    <rect x="40" y="52" width="20" height="16" rx="2" fill="none" stroke="#ff4d4d" stroke-width="2"/>
                    <path d="M44 52 V46C44 42 47 39 50 38C53 39 56 42 56 46V52" fill="none" stroke="#ff4d4d" stroke-width="2"/>
                </svg>
                <h1 class="text-3xl font-black text-white tracking-widest mt-4 uppercase italic">SEGURIDAD ACE</h1>
            </div>
            <div class="w-full max-w-[420px] bg-white rounded-[3rem] p-12 shadow-2xl">
                <div class="text-center mb-10"><h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">ACE-CONTROL</h2></div>
                <form class="space-y-6" onsubmit="login(event)">
                    <input id="email" type="email" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-slate-900 outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Email">
                    <input id="password" type="password" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-slate-900 outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="Contraseña">
                    <button type="submit" class="w-full bg-[#4262a0] text-white py-4 rounded-2xl font-bold uppercase shadow-lg hover:bg-blue-700 transition-all">Entrar</button>
                </form>
                <p id="login-error" class="text-red-500 text-center font-bold hidden mt-4 uppercase text-xs">Acceso Denegado</p>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app-container" class="hidden fixed inset-0 flex h-screen bg-slate-50 text-slate-800 overflow-hidden">
        <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col justify-between shrink-0">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-800 font-extrabold text-white text-lg italic tracking-widest">ACE-CONTROL</div>
                <nav class="mt-8 px-6 space-y-2">
                    <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
                    <button onclick="switchView('employees')" id="btn-employees" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="users"></i><span>Personal</span></button>
                    <button onclick="switchView('companies')" id="btn-companies" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="building-2"></i><span>Empresas</span></button>
                    <button onclick="switchView('courses')" id="btn-courses" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="book-open"></i><span>Cursos</span></button>
                    <button onclick="switchView('instructors')" id="btn-instructors" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="award"></i><span>Instructores</span></button>
                    <button onclick="switchView('trainings')" id="btn-trainings" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="file-check"></i><span>Capacitaciones</span></button>
                    <button onclick="switchView('dc3')" id="btn-dc3" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="printer"></i><span>DC-3 Historial</span></button>
                    <button onclick="switchView('users')" id="btn-users" class="nav-btn hidden w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="users-2"></i><span>Usuarios</span></button>
                </nav>
            </div>
            <div class="p-6 border-t border-slate-800"><button onclick="logout()" class="w-full text-red-400 font-bold hover:bg-red-500/10 py-3 rounded-xl transition-all">Salir del Sistema</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-10 shrink-0">
                <div class="flex items-center space-x-4">
                    <h1 id="page-title" class="text-2xl font-bold text-slate-800">Dashboard</h1>
                    <select id="user-filter" onchange="refreshCurrentView()" class="border rounded-xl px-4 py-2 bg-slate-50 font-bold text-sm text-slate-800 focus:outline-none">
                        <option value="ALL">Ver Todo</option>
                        <option value="d4r005@gmail.com">Dario Robles</option>
                        <option value="lugga.advisors@gmail.com">Cynthia Garza</option>
                    </select>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right leading-tight"><p id="user-name-display" class="font-extrabold text-slate-900"></p><p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Administrador ACE</p></div>
                    <div id="user-initials" class="h-10 w-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold uppercase tracking-widest text-sm">DA</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-10 space-y-10">
                <div id="view-dashboard" class="grid grid-cols-3 gap-8 text-slate-800">
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Personal</p><p id="stat-workers" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="users" class="w-8 h-8"></i></div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Cursos</p><p id="stat-courses" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-green-50 text-green-600 rounded-2xl"><i data-lucide="book-open" class="w-8 h-8"></i></div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Capacitaciones</p><p id="stat-trainings" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-purple-50 text-purple-600 rounded-2xl"><i data-lucide="file-check" class="w-8 h-8"></i></div>
                    </div>
                </div>

                <div id="view-content" class="hidden space-y-6">
                    <div class="flex justify-between items-center bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="flex space-x-3">
                            <input type="file" id="excel-input" class="hidden" onchange="handleExcel(this)">
                            <button id="upload-btn" onclick="document.getElementById('excel-input').click()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center space-x-2"><i data-lucide="upload" class="w-4 h-4"></i><span>Cargar Excel</span></button>
                            <button id="add-btn" onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center space-x-2 shadow-lg shadow-blue-200 hover:bg-blue-500 transition-all"><i data-lucide="plus" class="w-4 h-4"></i><span>Agregar</span></button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border shadow-sm overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead id="table-header" class="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black"></thead>
                            <tbody id="table-body" class="text-sm font-medium text-slate-600 divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modales -->
    <div id="modal" class="modal"><div class="modal-content"><h3 id="modal-title" class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-slate-800">Acción</h3><div id="modal-fields" class="space-y-4 max-h-[60vh] overflow-y-auto px-2"></div><div class="mt-10 flex justify-end space-x-4"><button onclick="closeModal()" class="text-slate-400 font-bold uppercase text-xs">Cancelar</button><button onclick="saveItem()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-200 hover:bg-blue-500 transition-all">Guardar</button></div></div></div>

    <script>
        const SUPABASE_URL = "https://osgfwgedjdltrmvwycjd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZ2Z3Z2VkamRsdHJtdnd5Y2pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDAxMzcsImV4cCI6MjA5OTgxNjEzN30.jeV98eAfhQzkXiGj88DUOLqLPLFr_IKPrcnTaefEgj0";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USERS = [
            { name: "Dario Robles", email: "d4r005@gmail.com", role: "ADMIN", password: "Branco2025" },
            { name: "Cynthia Garza Lugo", email: "lugga.advisors@gmail.com", role: "USER", password: "Cynthia123" }
        ];

        const CATALOGS = {
            occupations: ["01 Cultivo, crianza y aprovechamiento", "02 Extracción y suministro", "03 Construcción", "04 Tecnología", "05 Procesamiento y fabricación", "06 Transporte", "07 Provisión de bienes y servicios", "08 Gestión y soporte administrativo", "09 Salud y protección social", "10 Comunicación"],
            thematicAreas: ["1000 Producción general", "2000 Servicios", "3000 Administración", "4000 Comercialización", "5000 Mantenimiento", "6000 Seguridad", "7000 Desarrollo personal"]
        };

        let currentUser = null, currentView = 'dashboard';

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = USERS.find(u => u.email === email && u.password === pass);
            if(user) { currentUser = user; initApp(); } else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = currentUser.name;
            document.getElementById('user-initials').innerText = currentUser.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            if(currentUser.role === 'ADMIN') document.getElementById('btn-users')?.classList.remove('hidden');
            switchView('dashboard');
        }

        function getFilter() {
            const v = document.getElementById('user-filter').value;
            if (currentUser.role === 'ADMIN' && v === 'ALL') return null;
            return v === 'ALL' ? currentUser.email : v;
        }

        async function fetchResilient(table, filter) {
            try {
                let { data, error } = await sb.from(table).select('*');
                if (error) throw error;
                if (!filter) return data || [];
                return data.filter(d => (d.creatorEmail === filter || d.creator_email === filter));
            } catch (e) { return []; }
        }

        async function switchView(v) {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+v)?.classList.add('active');
            document.getElementById('view-dashboard').classList.toggle('hidden', v !== 'dashboard');
            document.getElementById('view-content').classList.toggle('hidden', v === 'dashboard');
            document.getElementById('upload-btn').classList.toggle('hidden', v !== 'employees');
            document.getElementById('add-btn').classList.toggle('hidden', !['employees','companies','courses','instructors','trainings'].includes(v));
            refreshCurrentView();
        }

        async function refreshCurrentView() {
            const f = getFilter();
            const header = document.getElementById('table-header');
            const body = document.getElementById('table-body');
            header.innerHTML = ""; body.innerHTML = "";

            if(currentView === 'dashboard') {
                const [emp, c, t] = await Promise.all([
                    fetchResilient('employees', f),
                    fetchResilient('courses', f),
                    fetchResilient('trainings', f)
                ]);
                document.getElementById('stat-workers').innerText = emp.length;
                document.getElementById('stat-courses').innerText = c.length;
                document.getElementById('stat-trainings').innerText = t.length;

            } else if(currentView === 'employees') {
                const data = await fetchResilient('employees', f);
                header.innerHTML = `<tr><th class="p-6">Nombre</th><th class="p-6">CURP</th><th class="p-6">Puesto</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(x => `<tr><td class="p-6 font-bold">${x.first_name} ${x.last_name}</td><td class="p-6 font-mono text-xs">${x.curp}</td><td class="p-6">${x.position}</td><td class="p-6 text-right"><button onclick="deleteItem('employees','${x.id}')" class="text-red-500 font-bold hover:underline">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center">Sin empleados</td></tr>';

            } else if(currentView === 'companies') {
                const data = await fetchResilient('companies', f);
                header.innerHTML = `<tr><th class="p-6">Empresa</th><th class="p-6">RFC</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(c => `<tr><td class="p-6 font-bold">${c.name}</td><td class="p-6 font-mono">${c.rfc}</td><td class="p-6 text-right"><button onclick="deleteItem('companies','${c.id}')" class="text-red-500 font-bold hover:underline">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin empresas</td></tr>';

            } else if(currentView === 'courses') {
                const data = await fetchResilient('courses', f);
                header.innerHTML = `<tr><th class="p-6">Curso</th><th class="p-6">Duración</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(c => `<tr><td class="p-6 font-bold uppercase">${c.name}</td><td class="p-6 font-bold text-blue-600">${c.duration} H</td><td class="p-6 text-right"><button onclick="deleteItem('courses','${c.id}')" class="text-red-500 font-bold hover:underline">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin cursos</td></tr>';

            } else if(currentView === 'instructors') {
                const data = await fetchResilient('instructors', f);
                header.innerHTML = `<tr><th class="p-6">Nombre Completo</th><th class="p-6">Registro STPS</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(i => `<tr><td class="p-6 font-bold uppercase">${i.full_name}</td><td class="p-6 font-mono">${i.stps_number || 'N/A'}</td><td class="p-6 text-right"><button onclick="deleteItem('instructors','${i.id}')" class="text-red-500 font-bold hover:underline">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin instructores</td></tr>';

            } else if(currentView === 'trainings') {
                const data = await fetchResilient('trainings', f);
                header.innerHTML = `<tr><th class="p-6">Empleado ID</th><th class="p-6">Curso ID</th><th class="p-6">Inicio</th><th class="p-6">Fin</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(t => `<tr><td class="p-6 font-bold">${t.employee_id}</td><td class="p-6">${t.course_id}</td><td class="p-6 font-mono text-xs">${t.start_date}</td><td class="p-6 font-mono text-xs">${t.end_date}</td><td class="p-6 text-right"><button onclick="deleteItem('trainings','${t.id}')" class="text-red-500 font-bold hover:underline">Eliminar</button></td></tr>`).join('') || '<tr><td colspan="5" class="p-10 text-center">Sin capacitaciones</td></tr>';

            } else if(currentView === 'dc3') {
                const data = await fetchResilient('dc3_records', f);
                header.innerHTML = `<tr><th class="p-6">Empleado</th><th class="p-6">Curso</th><th class="p-6 text-right">Acciones</th></tr>`;
                body.innerHTML = data.map(d => `<tr><td class="p-6 font-bold">${d.worker_name || d.workerId}</td><td class="p-6">${d.course_name}</td><td class="p-6 text-right"><button class="text-blue-600 font-bold hover:underline">Descargar PDF</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin historial</td></tr>';

            } else if(currentView === 'users') {
                header.innerHTML = `<tr><th class="p-6">Nombre</th><th class="p-6">Email</th><th class="p-6">Rol</th></tr>`;
                body.innerHTML = USERS.map(u => `<tr><td class="p-6 font-bold">${u.name}</td><td class="p-6">${u.email}</td><td class="p-6"><span class="px-3 py-1 rounded-full text-xs font-black bg-blue-100 text-blue-700">${u.role}</span></td></tr>`).join('');
            }
            lucide.createIcons();
        }

        function openModal() {
            const fields = document.getElementById('modal-fields');
            document.getElementById('modal').style.display = 'block';
            fields.innerHTML = "";
            if(currentView === 'employees') {
                document.getElementById('modal-title').innerText = "Nuevo Empleado";
                fields.innerHTML = `
                    <div class="grid grid-cols-2 gap-4"><input id="v1" placeholder="No. Empleado" class="p-4 bg-slate-50 border rounded-2xl"><input id="v2" placeholder="CURP" class="p-4 bg-slate-50 border rounded-2xl"></div>
                    <input id="v3" placeholder="Nombre(s)" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">
                    <div class="grid grid-cols-2 gap-4 mt-4"><input id="v4" placeholder="Apellido Paterno" class="p-4 bg-slate-50 border rounded-2xl"><input id="v5" placeholder="Apellido Materno" class="p-4 bg-slate-50 border rounded-2xl"></div>
                    <input id="v6" placeholder="Puesto" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">
                `;
            } else if(currentView === 'companies') {
                document.getElementById('modal-title').innerText = "Nueva Empresa";
                fields.innerHTML = `<input id="f1" placeholder="Nombre o Razón Social" class="w-full p-4 bg-slate-50 border rounded-2xl"><input id="f2" placeholder="RFC" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">`;
            } else if(currentView === 'courses') {
                document.getElementById('modal-title').innerText = "Nuevo Curso";
                fields.innerHTML = `<input id="c1" placeholder="Nombre del Curso" class="w-full p-4 bg-slate-50 border rounded-2xl"><input id="c2" type="number" placeholder="Horas" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">`;
            } else if(currentView === 'instructors') {
                document.getElementById('modal-title').innerText = "Nuevo Instructor";
                fields.innerHTML = `<input id="i1" placeholder="Nombre Completo" class="w-full p-4 bg-slate-50 border rounded-2xl"><input id="i2" placeholder="Registro STPS" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">`;
            } else if(currentView === 'trainings') {
                document.getElementById('modal-title').innerText = "Nueva Capacitación";
                fields.innerHTML = `<input id="t1" placeholder="ID Empleado" class="w-full p-4 bg-slate-50 border rounded-2xl"><input id="t2" placeholder="ID Curso" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4"><input id="t3" type="date" class="w-full p-4 bg-slate-50 border rounded-2xl mt-4">`;
            }
        }

        async function saveItem() {
            let doc = { creatorEmail: currentUser.email };
            if(currentView === 'employees') {
                doc = { ...doc, employee_number: document.getElementById('v1').value, curp: document.getElementById('v2').value.toUpperCase(), first_name: document.getElementById('v3').value, last_name: document.getElementById('v4').value, middle_name: document.getElementById('v5').value, position: document.getElementById('v6').value };
            } else if(currentView === 'companies') {
                doc = { ...doc, name: document.getElementById('f1').value, rfc: document.getElementById('f2').value.toUpperCase() };
            } else if(currentView === 'courses') {
                doc = { ...doc, name: document.getElementById('c1').value, duration: parseInt(document.getElementById('c2').value) };
            } else if(currentView === 'instructors') {
                doc = { ...doc, full_name: document.getElementById('i1').value, stps_number: document.getElementById('i2').value };
            } else if(currentView === 'trainings') {
                doc = { ...doc, employee_id: parseInt(document.getElementById('t1').value), course_id: parseInt(document.getElementById('t2').value), start_date: document.getElementById('t3').value };
            }
            await sb.from(currentView).insert([doc]);
            closeModal(); refreshCurrentView();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function logout() { location.reload(); }
        async function deleteItem(t, id) { if(confirm("¿Borrar?")) { await sb.from(t).delete().match({id}); refreshCurrentView(); } }
    </script>
</body>
</html>
