<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>ACE-Control | Gestión de Agente Capacitador Externo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1329; }
        .login-bg { background-color: #0c242c; background-image: radial-gradient(circle at center, #1c454e 0%, #0c242c 100%); }
        .nav-btn.active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 500px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="antialiased text-slate-200 h-screen overflow-hidden">

    <div id="view-login" class="login-bg min-h-screen flex items-center justify-center px-4">
        <div class="flex max-w-5xl w-full items-center justify-between">
            <div class="hidden lg:flex w-1/2 flex-col items-center">
                <svg viewBox="0 0 100 100" class="w-72 h-72 drop-shadow-[0_0_15px_rgba(34,211,238,0.4)]">
                    <path d="M50 10 L85 30 L85 70 L50 90 L15 70 L15 30 Z" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
                    <rect x="40" y="52" width="20" height="16" rx="2" fill="none" stroke="#ff4d4d" stroke-width="2"/>
                    <path d="M44 52 V46C44 42 47 39 50 38C53 39 56 42 56 46V52" fill="none" stroke="#ff4d4d" stroke-width="2"/>
                </svg>
                <h1 class="text-3xl font-black text-white tracking-widest mt-4 uppercase italic">SEGURIDAD ACE</h1>
            </div>
            <div class="w-full max-w-[420px] bg-white rounded-[3rem] p-12 shadow-2xl">
                <div class="text-center mb-10"><h2 class="text-3xl font-black text-slate-800 tracking-tighter uppercase italic">ACE-CONTROL</h2></div>
                <form class="space-y-6" onsubmit="login(event)">
                    <input id="email" type="email" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-slate-900 outline-none" placeholder="Email">
                    <input id="password" type="password" required class="w-full bg-slate-50 rounded-2xl px-5 py-4 text-slate-900 outline-none" placeholder="Password">
                    <button type="submit" class="w-full bg-[#4262a0] text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Entrar</button>
                </form>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden fixed inset-0 flex h-screen bg-slate-50 text-slate-800 overflow-hidden">
        <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col justify-between shrink-0">
            <div>
                <div class="h-20 flex items-center px-8 border-b border-slate-800 font-extrabold text-white text-lg italic tracking-widest">ACE-CONTROL</div>
                <nav class="mt-8 px-6 space-y-2">
                    <button onclick="switchView('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
                    <button onclick="switchView('workers')" id="btn-workers" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="users"></i><span>Personal (Excel)</span></button>
                    <button onclick="switchView('companies')" id="btn-companies" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="building-2"></i><span>Empresas</span></button>
                    <button onclick="switchView('courses')" id="btn-courses" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="book-open"></i><span>Cursos</span></button>
                    <button onclick="switchView('agents')" id="btn-agents" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="award"></i><span>Agentes Cap.</span></button>
                    <button onclick="switchView('dc3')" id="btn-dc3" class="nav-btn w-full flex items-center space-x-3 px-5 py-3 rounded-xl text-sm font-semibold transition-all"><i data-lucide="file-check"></i><span>DC-3 Generados</span></button>
                </nav>
            </div>
            <div class="p-6 border-t border-slate-800"><button onclick="logout()" class="w-full text-red-400 font-bold hover:bg-red-500/10 py-3 rounded-xl">Salir del Sistema</button></div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b flex items-center justify-between px-10 shrink-0">
                <div class="flex items-center space-x-4">
                    <h1 id="page-title" class="text-2xl font-bold">Dashboard</h1>
                    <select id="user-filter" onchange="refreshCurrentView()" class="border rounded-xl px-4 py-2 bg-slate-50 font-bold text-sm text-slate-800">
                        <option value="ALL">Ver Todo</option>
                        <option value="d4r005@gmail.com">Dario Robles</option>
                        <option value="lugga.advisors@gmail.com">Cynthia Garza</option>
                    </select>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-right leading-tight"><p id="user-name-display" class="font-extrabold text-slate-900"></p><p class="text-[10px] text-slate-500 font-black uppercase tracking-widest">Administrador ACE</p></div>
                    <div id="user-initials" class="h-10 w-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold uppercase tracking-widest"></div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-10 space-y-10">
                <div id="view-dashboard" class="grid grid-cols-3 gap-8 text-slate-800">
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Personal</p><p id="stat-workers" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="users" class="w-8 h-8"></i></div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Cursos</p><p id="stat-courses" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-green-50 text-green-600 rounded-2xl"><i data-lucide="book-open" class="w-8 h-8"></i></div>
                    </div>
                    <div class="bg-white p-8 rounded-3xl border shadow-sm flex justify-between items-center group hover:shadow-xl transition-all">
                        <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">DC-3</p><p id="stat-dc3" class="text-4xl font-black mt-2">0</p></div>
                        <div class="p-4 bg-purple-50 text-purple-600 rounded-2xl"><i data-lucide="file-check" class="w-8 h-8"></i></div>
                    </div>
                </div>

                <div id="view-content" class="hidden space-y-6">
                    <div class="flex justify-between items-center bg-white p-6 rounded-2xl border shadow-sm">
                        <div class="flex space-x-3">
                            <input type="file" id="excel-input" class="hidden" onchange="handleExcel(this)">
                            <button id="upload-btn" onclick="document.getElementById('excel-input').click()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center space-x-2"><i data-lucide="upload" class="w-4 h-4"></i><span>Cargar Excel</span></button>
                            <button id="add-btn" onclick="openModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm flex items-center space-x-2 shadow-lg shadow-blue-200"><i data-lucide="plus" class="w-4 h-4"></i><span>Agregar</span></button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border overflow-hidden shadow-sm">
                        <table class="w-full text-left border-collapse">
                            <thead id="table-header" class="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black"></thead>
                            <tbody id="table-body" class="text-sm font-medium text-slate-600 divide-y"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal"><div class="modal-content"><h3 id="modal-title" class="text-2xl font-black mb-8 uppercase italic tracking-tighter text-slate-800">Acción</h3><div id="modal-fields" class="space-y-6"></div><div class="mt-10 flex justify-end space-x-4"><button onclick="closeModal()" class="text-slate-400 font-bold uppercase text-xs">Cancelar</button><button onclick="saveItem()" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-200 hover:bg-blue-500 transition-all">Guardar</button></div></div></div>

    <div id="dc3-modal" class="modal text-slate-800">
        <div class="modal-content" style="width: 600px;">
            <h3 class="text-2xl font-black text-center mb-6 uppercase italic border-b pb-4">Configurar Formato Oficial DC-3</h3>
            <div id="dc3-fields" class="space-y-6">
                <div><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Trabajador</label><p id="dc3-worker-name" class="text-lg font-black text-blue-600"></p></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Empresa</label><select id="dc3-company" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></select></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Curso</label><select id="dc3-course" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Fecha Inicio</label><input type="date" id="dc3-start" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Fecha Fin</label><input type="date" id="dc3-end" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Rep. Patrón</label><input id="dc3-patron" placeholder="Nombre de quien firma" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></div>
                    <div><label class="text-[10px] font-black text-slate-400 uppercase">Rep. Trabajadores</label><input id="dc3-workers" placeholder="Nombre de quien firma" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm ring-1 ring-slate-200"></div>
                </div>
            </div>
            <div class="mt-10 flex justify-end space-x-4"><button onclick="document.getElementById('dc3-modal').style.display='none'" class="text-slate-400 font-bold uppercase text-xs">Cerrar</button><button onclick="generateSingleDC3()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black uppercase shadow-xl tracking-widest">Generar y Descargar PDF</button></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://osgfwgedjdltrmvwycjd.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZ2Z3Z2VkamRsdHJtdnd5Y2pkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDAxMzcsImV4cCI6MjA5OTgxNjEzN30.jeV98eAfhQzkXiGj88DUOLqLPLFr_IKPrcnTaefEgj0";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USERS = [
            { name: "Dario Robles", email: "d4r005@gmail.com", role: "ADMIN", password: "Branco2025" },
            { name: "Cynthia Garza Lugo", email: "lugga.advisors@gmail.com", role: "USER", password: "Cynthia123" }
        ];

        let currentUser = null, currentView = 'dashboard', selectedWorker = null;

        async function login(e) {
            e.preventDefault();
            const user = USERS.find(u => u.email === document.getElementById('email').value.trim() && u.password === document.getElementById('password').value.trim());
            if(user) { currentUser = user; initApp(); } else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        function initApp() {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = currentUser.name;
            document.getElementById('user-initials').innerText = currentUser.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
            if(currentUser.role === 'ADMIN') document.getElementById('btn-users')?.classList.remove('hidden');
            switchView('dashboard');
        }

        function getFilter() {
            const v = document.getElementById('user-filter').value;
            if (currentUser.role === 'ADMIN' && v === 'ALL') return null;
            return v === 'ALL' ? currentUser.email : v;
        }

        async function fetchResilient(table, filter) {
            try {
                let { data } = await sb.from(table).select('*');
                if (!filter) return data || [];
                return data.filter(d => (d.creatorEmail === filter || d.creator_email === filter));
            } catch (e) { return []; }
        }

        async function switchView(v) {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+v)?.classList.add('active');
            document.getElementById('view-dashboard').classList.toggle('hidden', v !== 'dashboard');
            document.getElementById('view-content').classList.toggle('hidden', v === 'dashboard');
            document.getElementById('upload-btn').classList.toggle('hidden', v !== 'workers');
            document.getElementById('add-btn').classList.toggle('hidden', !['workers','companies','courses','agents'].includes(v));
            refreshCurrentView();
        }

        async function refreshCurrentView() {
            const f = getFilter();
            if(currentView === 'dashboard') {
                const w = await fetchResilient('workers', f);
                const d = await fetchResilient('dc3_records', f);
                const c = await fetchResilient('courses', f);
                document.getElementById('stat-workers').innerText = w.length;
                document.getElementById('stat-dc3').innerText = d.length;
                document.getElementById('stat-courses').innerText = c.length;
            } else if(currentView === 'workers') {
                const data = await fetchResilient('workers', f);
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Nombre</th><th class="p-6">CURP</th><th class="p-6 text-right">Acciones</th></tr>`;
                document.getElementById('table-body').innerHTML = data.map(x => `<tr><td class="p-6 font-bold text-slate-800">${x.name}</td><td class="p-6 font-mono text-xs">${x.curp}</td><td class="p-6 text-right"><button onclick='openDC3Modal(${JSON.stringify(x)})' class="text-blue-600 font-bold">Generar DC-3</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin personal</td></tr>';
            } else if(currentView === 'companies') {
                const data = await fetchResilient('companies', f);
                document.getElementById('table-header').innerHTML = `<tr><th class="p-6">Empresa</th><th class="p-6">RFC</th><th class="p-6 text-right">Acciones</th></tr>`;
                document.getElementById('table-body').innerHTML = data.map(c => `<tr><td class="p-6 font-bold text-slate-800">${c.name}</td><td class="p-6 font-mono">${c.rfc}</td><td class="p-6 text-right"><button onclick="deleteItem('companies','${c.id}')" class="text-red-500 font-bold">Borrar</button></td></tr>`).join('') || '<tr><td colspan="3" class="p-10 text-center">Sin empresas</td></tr>';
            }
            lucide.createIcons();
        }

        function openModal() {
            const fields = document.getElementById('modal-fields');
            document.getElementById('modal').style.display = 'block';
            if(currentView === 'workers') {
                fields.innerHTML = `<input id="f1" placeholder="Nombre Completo" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-slate-800"><input id="f2" placeholder="CURP" class="w-full p-4 bg-slate-50 rounded-2xl border mt-4 font-bold text-slate-800"><input id="f4" placeholder="Puesto" class="w-full p-4 bg-slate-50 rounded-2xl border mt-4 font-bold text-slate-800">`;
            } else if(currentView === 'companies') {
                fields.innerHTML = `<input id="f1" placeholder="Nombre" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-slate-800"><input id="f2" placeholder="RFC" class="w-full p-4 bg-slate-50 rounded-2xl border mt-4 font-bold text-slate-800">`;
            }
        }

        async function saveItem() {
            let doc = { creatorEmail: currentUser.email };
            if(currentView === 'workers') doc = { ...doc, name: document.getElementById('f1').value, curp: document.getElementById('f2').value.toUpperCase(), position: document.getElementById('f4').value };
            else if(currentView === 'companies') doc = { ...doc, name: document.getElementById('f1').value, rfc: document.getElementById('f2').value.toUpperCase() };
            await sb.from(currentView).insert([doc]);
            closeModal(); refreshCurrentView();
        }

        async function openDC3Modal(worker) {
            selectedWorker = worker;
            document.getElementById('dc3-worker-name').innerText = worker.name;
            const cos = await fetchResilient('companies', null);
            const crs = await fetchResilient('courses', null);
            document.getElementById('dc3-company').innerHTML = cos.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('dc3-course').innerHTML = crs.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('dc3-modal').style.display = 'block';
        }

        async function generateSingleDC3() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const company = (await fetchResilient('companies', null)).find(c => c.name === document.getElementById('dc3-company').value);
            const course = (await fetchResilient('courses', null)).find(c => c.name === document.getElementById('dc3-course').value);

            // PLANTILLA OFICIAL - COORDENADAS FIJAS SEGÚN IMAGEN
            doc.setFont("helvetica", "bold"); doc.setFontSize(14);
            doc.text("FORMATO DC-3", 105, 20, null, null, "center");
            doc.setFontSize(8); doc.text("CONSTANCIA DE COMPETENCIAS O DE HABILIDADES LABORALES", 105, 28, null, null, "center");

            const drawBar = (text, y) => {
                doc.setFillColor(230, 230, 230); doc.rect(15, y, 180, 6, 'F');
                doc.setFontSize(7); doc.setTextColor(0); doc.text(text, 17, y + 4.5);
            };

            // SECCIÓN 1: TRABAJADOR
            drawBar("DATOS DEL TRABAJADOR", 38);
            doc.setFontSize(6); doc.setTextColor(150, 0, 0); doc.text("Nombre (Anotar apellido paterno, apellido materno y nombre(s))", 15, 50);
            doc.setFontSize(10); doc.setTextColor(0); doc.text(selectedWorker.name.toUpperCase(), 15, 56);
            doc.line(15, 57, 195, 57);

            doc.setFontSize(6); doc.setTextColor(150, 0, 0); doc.text("Clave Única de Registro de Población", 15, 64);
            const curp = selectedWorker.curp.toUpperCase().padEnd(18);
            for(let i=0; i<18; i++) { doc.rect(15 + (i * 4.5), 66, 4.5, 6); doc.text(curp[i], 16 + (i * 4.5), 70.5); }

            // SECCIÓN 2: EMPRESA
            drawBar("DATOS DE LA EMPRESA", 85);
            doc.setFontSize(6); doc.setTextColor(150, 0, 0); doc.text("Nombre o razón social", 15, 97);
            doc.setFontSize(10); doc.setTextColor(0); doc.text(company.name.toUpperCase(), 15, 103);
            doc.line(15, 104, 195, 104);

            // FIRMAS
            doc.setFontSize(7); doc.text("aquél que no se conduce con verdad.", 105, 180, null, null, "center");
            const pat = document.getElementById('dc3-patron').value;
            const wor = document.getElementById('dc3-workers').value;
            doc.line(80, 210, 130, 210); doc.text("Patrón", 105, 215, null, null, "center"); doc.text(pat, 105, 208, null, null, "center");
            doc.line(140, 210, 190, 210); doc.text("Representante", 165, 215, null, null, "center"); doc.text(wor, 165, 208, null, null, "center");

            doc.save(`DC3_${selectedWorker.curp}.pdf`);
            // Guardar registro
            await sb.from('dc3_records').insert([{ worker_name: selectedWorker.name, worker_id: selectedWorker.curp, course_name: course.name, company_name: company.name, start_date: document.getElementById('dc3-start').value, creatorEmail: currentUser.email }]);
            document.getElementById('dc3-modal').style.display='none';
            refreshCurrentView();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function logout() { location.reload(); }
        async function deleteItem(t, id) { if(confirm("¿Borrar?")) { await sb.from(t).delete().match({id}); refreshCurrentView(); } }
    </script>
</body>
</html>
