<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Control - Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Sidebar -->
    <div class="flex h-screen">
        <div class="bg-slate-900 text-white w-64 p-6 space-y-6">
            <h1 class="text-2xl font-bold border-b border-slate-700 pb-4">ACE Control</h1>
            <nav class="space-y-4">
                <a href="#" class="block py-2.5 px-4 rounded transition duration-200 bg-blue-600">Dashboard</a>
                <a href="#" onclick="fetchWorkers()" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700">Personal (Excel)</a>
                <a href="#" onclick="fetchCourses()" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700">Cursos</a>
                <a href="#" class="block py-2.5 px-4 rounded transition duration-200 hover:bg-slate-700">Historial DC-3</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800" id="section-title">Resumen General</h2>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Usuario: Dario Robles</span>
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white">DR</div>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                        <h3 class="text-gray-500 text-sm font-medium">Personal Registrado</h3>
                        <p class="text-3xl font-bold text-gray-800" id="worker-count">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
                        <h3 class="text-gray-500 text-sm font-medium">Cursos Activos</h3>
                        <p class="text-3xl font-bold text-gray-800" id="course-count">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-purple-500">
                        <h3 class="text-gray-500 text-sm font-medium">DC-3 Generados</h3>
                        <p class="text-3xl font-bold text-gray-800">124</p>
                    </div>
                </div>

                <!-- Table Content -->
                <div class="bg-white shadow-md rounded-lg overflow-hidden">
                    <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="font-bold text-gray-700" id="table-title">Datos Recientes</h3>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Exportar Reporte</button>
                    </div>
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr id="table-header">
                                <!-- Headers dynamic -->
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="4" class="p-4 text-center text-gray-500">Cargando datos de acecontrol...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        const ATLAS_URL = "https://data.mongodb-api.com/app/data-jshze/endpoint/data/v1/action";
        const API_KEY = "al-b14XHfG6V17yJMOy1lmUWm9vCbuLZG1-Ot7Mp0YAMhH";

        async function fetchWorkers() {
            document.getElementById('section-title').innerText = "Personal Registrado (Excel)";
            document.getElementById('table-header').innerHTML = `
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">CURP</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ocupación</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Puesto</th>
            `;

            const response = await fetch(ATLAS_URL + "/find", {
                method: "POST",
                headers: { "Content-Type": "application/json", "api-key": API_KEY },
                body: JSON.stringify({ dataSource: "acecontrol", database: "DC3_Database", collection: "workers", filter: {} })
            });
            const data = await response.json();
            const list = data.documents;
            document.getElementById('worker-count').innerText = list.length;

            let html = "";
            list.forEach(w => {
                html += `<tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${w.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${w.curp}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${w.occupation}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${w.position}</td>
                </tr>`;
            });
            document.getElementById('table-body').innerHTML = html;
        }

        async function fetchCourses() {
            document.getElementById('section-title').innerText = "Catálogo de Cursos";
            document.getElementById('table-header').innerHTML = `
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Horas</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Área</th>
            `;

            const response = await fetch(ATLAS_URL + "/find", {
                method: "POST",
                headers: { "Content-Type": "application/json", "api-key": API_KEY },
                body: JSON.stringify({ dataSource: "acecontrol", database: "DC3_Database", collection: "courses", filter: {} })
            });
            const data = await response.json();
            const list = data.documents;
            document.getElementById('course-count').innerText = list.length;

            let html = "";
            list.forEach(c => {
                html += `<tr>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${c.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${c.durationHours}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${c.thematicArea}</td>
                </tr>`;
            });
            document.getElementById('table-body').innerHTML = html;
        }

        // Carga inicial
        fetchWorkers();
        fetchCourses();
    </script>
</body>
</html>
