        // ─── Cloudflare Worker helpers (Proxy to Supabase) ───────────
        async function sbSelect(table, filterEmail) {
            let url = `${WORKER_URL}/${table}`;
            if (filterEmail) url += `?creatorEmail=${filterEmail}`;
            try {
                const r = await fetch(url);
                const data = await r.json();
                return data.documents || [];
            } catch (e) { console.error(e); return []; }
        }

        async function sbInsert(table, doc) {
            try {
                const r = await fetch(`${WORKER_URL}/${table}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ document: doc })
                });
                const data = await r.json();
                return data.inserted;
            } catch (e) { console.error(e); return null; }
        }

        async function sbInsertMany(table, docs) {
            try {
                const r = await fetch(`${WORKER_URL}/${table}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ documents: docs })
                });
                return r.ok;
            } catch (e) { console.error(e); return false; }
        }

        async function sbDelete(table, id) {
            try {
                const r = await fetch(`${WORKER_URL}/${table}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },

        // ─── Supabase helpers ─────────────────────────────────────────
        async function sbSelect(table, filterEmail) {
            let q = sb.from(table).select('*');
            if (filterEmail) q = q.eq('creator_email', filterEmail);
            const { data, error } = await q.order('created_at', { ascending: false });
            if (error) { console.error('sbSelect', table, error.message); return []; }
            return data || [];
        }

        async function sbInsert(table, doc) {
            const { data, error } = await sb.from(table).insert([doc]).select();
            if (error) { console.error('sbInsert', table, error.message); return null; }
            return data;
        }

        async function sbInsertMany(table, docs) {
            const { error } = await sb.from(table).insert(docs);
            if (error) { console.error('sbInsertMany', table, error.message); return false; }
            return true;
        }

        async function sbDelete(table, id) {
            const { error } = await sb.from(table).delete().eq('id', id);
            if (error) { console.error('sbDelete', table, error.message); return false; }
            return true;
        }

        async function saveItem() {
            let doc = null, table = '';

            if (currentView === 'workers') {
                const name = (document.getElementById('f1').value || '').trim();
                const curp = (document.getElementById('f2').value || '').trim().toUpperCase();
                const occ  = document.getElementById('f3').value;
                const pos  = (document.getElementById('f4').value || '').trim();
                if (!name || !curp || !occ || !pos) { showToast('Completa todos los campos', false); return; }
                table = 'workers';
                doc   = { name, curp, occupation: occ, position: pos, creator_email: currentUser.email };

            } else if (currentView === 'companies') {
                const name = (document.getElementById('f1').value || '').trim();
                const rfc  = (document.getElementById('f2').value || '').trim().toUpperCase();
                if (!name || !rfc) { showToast('Completa todos los campos', false); return; }
                table = 'companies';
                doc   = { name, rfc, creator_email: currentUser.email };

            } else if (currentView === 'courses') {
                const name  = (document.getElementById('f1').value || '').trim().toUpperCase();
                const hours = parseInt(document.getElementById('f2').value) || 0;
                if (!name || hours < 1) { showToast('Ingresa nombre y horas válidas', false); return; }
                table = 'courses';
                doc   = { name, duration_hours: hours, creator_email: currentUser.email };

            } else if (currentView === 'agents') {
                const name = (document.getElementById('f1').value || '').trim().toUpperCase();
                const stps = (document.getElementById('f2').value || '').trim();
                if (!name || !stps) { showToast('Completa todos los campos', false); return; }
                table = 'agents';
                doc   = { name, stps, creator_email: currentUser.email };
            }

            if (doc) {
                const result = await sbInsert(table, doc);
                if (result !== null) {
                    showToast('✓ Guardado correctamente');
                    document.getElementById('modal').style.display = 'none';
                    allCompanies = []; // refresh cache
                    await refreshCurrentView();
                } else {
                    showToast('Error al guardar', false);
                }
            }
        }

        function drawTableRow(doc, x, y, w1, t1, w2, t2, w3, t3, w4, t4, h) {
            doc.rect(x, y, w1, h); doc.rect(x+w1, y, w2, h);
            doc.rect(x+w1+w2, y, w3, h); doc.rect(x+w1+w2+w3, y, w4, h);
            doc.text(t1||'', x+1, y+h-1.5);
            doc.text(t2||'', x+w1+1, y+h-1.5);

            doc.text(t4||'', x+w1+w2+w3+1, y+h-1.5);
        }

        async function generateSingleDC3() {
            try {
                const companyName = document.getElementById('dc3-company').value;
                const courseName  = document.getElementById('dc3-course').value;
                const startDate   = document.getElementById('dc3-start').value;
                const endDate     = document.getElementById('dc3-end').value;

                if (!companyName || !courseName || !startDate || !endDate) {
                    showToast('Completa todos los campos del DC-3', false); return;
                }

                // Obtener datos antes de crear el PDF
                const companyRfc = (allCompanies.find(c => c.name === companyName) || {}).rfc || '';
                const courseData = cachedCourses.find(c => c.name === courseName) || {};
                const durationHours = courseData.duration_hours || 8;
                const ag = cachedAgents[0] || {};

                const doc = new jspdf.jsPDF();
                const W = 210, M = 15;
                let y = 15;

                // ── Título ──
                doc.setFont('helvetica','bold'); doc.setFontSize(13);
                doc.text('FORMATO DC-3', 105, y, null, null, 'center');
                y += 6;
                doc.setFont('helvetica','normal'); doc.setFontSize(7);
                doc.text('CONSTANCIA DE COMPETENCIAS O DE HABILIDADES LABORALES', 105, y, null, null, 'center');
                y += 8;

                // ── Sección 1: DATOS DEL TRABAJADOR ──
                doc.setFillColor(235,235,235); doc.rect(M, y, W-2*M, 7, 'F');
                doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
                doc.text('DATOS DEL TRABAJADOR', M+2, y+5);
                y += 10;

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Nombre (Anotar apellido paterno, apellido materno y nombre(s))', M, y);
                y += 4;
                doc.setFont('helvetica','bold'); doc.setFontSize(8);
                doc.text(selectedWorker.name || '', M, y);
                doc.line(M, y+1.5, W-M, y+1.5);
                y += 8;

                // CURP grid (18 casillas)
                const curp = (selectedWorker.curp||'').toUpperCase().padEnd(18).substring(0,18);
                const boxW = 4.2, boxH = 5;
                doc.setFont('helvetica','normal'); doc.setFontSize(4.5);
                doc.text('Clave Única de Registro de Población', M, y);
                for (let i=0; i<18; i++) {
                    const cx = M + i*boxW;
                    doc.rect(cx, y+1, boxW, boxH);
                    if (curp[i] && curp[i] !== ' ') {
                        doc.setFont('helvetica','bold'); doc.setFontSize(6);
                        doc.text(curp[i], cx+1.3, y+4.5);
                    }
                }

                const occX = M + 18*boxW + 4;
                doc.setFont('helvetica','normal'); doc.setFontSize(4);
                doc.text('Ocupación específica (Catálogo Nacional de Ocupaciones)', occX, y);
                doc.setFont('helvetica','bold'); doc.setFontSize(6);
                doc.text(selectedWorker.occupation || '', occX, y+4);
                doc.line(occX, y+5, W-M, y+5);
                y += 12;

                doc.setFont('helvetica','normal'); doc.setFontSize(4.5);
                doc.text('Puesto', M, y);
                y += 4;
                doc.setFont('helvetica','bold'); doc.setFontSize(7);
                doc.text(selectedWorker.position || '', M, y);
                doc.line(M, y+1.5, W-M, y+1.5);
                y += 10;

                // ── Sección 2: DATOS DE LA EMPRESA ──
                doc.setFillColor(235,235,235); doc.rect(M, y, W-2*M, 7, 'F');
                doc.setFont('helvetica','bold'); doc.setFontSize(6.5);
                doc.text('DATOS DE LA EMPRESA', M+2, y+5);
                y += 10;

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Nombre o razón social (En caso de persona física, anotar apellido paterno, materno y nombre(s))', M, y);
                y += 4;
                doc.setFont('helvetica','bold'); doc.setFontSize(8);
                doc.text(companyName, M, y);
                doc.line(M, y+1.5, W-M, y+1.5);
                y += 8;

                // RFC grid (13 casillas con homoclave)
                const rfc = (companyRfc||'').toUpperCase().padEnd(13).substring(0,13);
                doc.setFont('helvetica','normal'); doc.setFontSize(4.5);
                doc.text('Registro Federal de Contribuyentes con homoclave (SHCP)', M, y);
                const rfcBoxW = 4.5, rfcBoxH = 5;
                for (let i=0; i<13; i++) {
                    const cx = M + i*rfcBoxW;
                    doc.rect(cx, y+1, rfcBoxW, rfcBoxH);
                    if (rfc[i] && rfc[i] !== ' ') {
                        doc.setFont('helvetica','bold'); doc.setFontSize(6);
                        doc.text(rfc[i], cx+1.5, y+4.5);
                    }
                }
                y += 12;

                // ── Sección 3: DATOS DEL PROGRAMA DE CAPACITACIÓN ──
                doc.setFillColor(235,235,235); doc.rect(M, y, W-2*M, 7, 'F');
                doc.setFont('helvetica','bold'); doc.setFontSize(6.5);

                doc.line(M, y+1.5, M+30, y+1.5);
                y += 8;

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Periodo de ejecución:', M, y);
                doc.setFont('helvetica','bold'); doc.setFontSize(7);
                doc.text('De: ' + startDate + '    a: ' + endDate, M+30, y);
                doc.line(M+28, y+1.5, W-M, y+1.5);
                y += 8;

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Área temática del curso', M, y);
                y += 4;
                doc.setFont('helvetica','bold'); doc.setFontSize(7);
                doc.text('(6000) Seguridad', M, y);
                doc.line(M, y+1.5, W-M, y+1.5);
                y += 8;

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Nombre del agente capacitador o STPS', M, y);
                y += 4;
                doc.setFont('helvetica','bold'); doc.setFontSize(7);
                doc.text((ag.name||'') + '    ' + (ag.stps||''), M, y);
                doc.line(M, y+1.5, W-M, y+1.5);
                y += 20;

                // ── Firmas (formato oficial DC-3 STPS) ──
                // Sección de firmas: 3 columnas iguales
                const sigSectionY = y + 5;
                const colW = (W - 2*M) / 3;
                const lineY = sigSectionY + 35; // línea de firma

                // Aviso legal arriba de la sección
                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Serán sancionados con las penas previstas en el Código Penal para el Distrito Federal en Materia de Fuero Común,', M, sigSectionY);
                doc.text('y para toda la República en Materia de Fuero Federal, así como el Capítulo III del Título Cuarto de la Ley Federal del', M, sigSectionY+4);
                doc.text('Trabajo, aquel que no se conduce con verdad.', M, sigSectionY+8);

                const sigY2 = sigSectionY + 18;

                // ── Col 1: Instructor o tutor (con firma digital de Cynthia) ──
                const col1X = M;
                const col1LineX2 = col1X + colW - 4;

                // Cargar y colocar la firma oficial
                try {
                    const sigImg = new Image();
                    sigImg.crossOrigin = 'anonymous';
                    sigImg.src = SIG_URL;
                    await new Promise((resolve) => {
                        sigImg.onload = () => {
                            try {
                                // Firma centrada en la columna, proporción correcta
                                const maxW = 38, maxH = 20;
                                let sw = maxW, sh = maxW * (sigImg.height / sigImg.width);
                                if (sh > maxH) { sh = maxH; sw = maxH * (sigImg.width / sigImg.height); }
                                const sx = col1X + (colW - sw) / 2 - 2;
                                doc.addImage(sigImg, 'PNG', sx, sigY2, sw, sh);
                            } catch(e) { console.warn('Firma:', e); }
                            resolve();
                        };
                        sigImg.onerror = () => resolve();
                        if (sigImg.complete) { sigImg.onload(); }
                    });
                } catch(e) {}

                // Línea instructor
                const lineY2 = sigY2 + 22;
                doc.setLineWidth(0.4);
                doc.line(col1X, lineY2, col1LineX2, lineY2);

                doc.setTextColor(180,0,0);
                doc.text('Instructor o tutor', col1X + (col1LineX2-col1X-doc.getTextWidth('Instructor o tutor'))/2, lineY2+9);

                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Nombre y firma', col1X + (col1LineX2-col1X-doc.getTextWidth('Nombre y firma'))/2, lineY2+14);

                // ── Col 2: Patrón o representante legal ──

                doc.line(col2X, lineY2, col2LineX2, lineY2);

                doc.text(pat1, col2X + (col2LineX2-col2X-doc.getTextWidth(pat1))/2, lineY2+6);

                doc.text('Nombre y firma', col2X + (col2LineX2-col2X-doc.getTextWidth('Nombre y firma'))/2, lineY2+11);

                // ── Col 3: Representante de los trabajadores ──
                const col3X = M + 2*colW + 4;
                const col3LineX2 = W - M;

                doc.line(col3X, lineY2, col3LineX2, lineY2);
                doc.setFont('helvetica','normal'); doc.setFontSize(6);
                const rep1 = 'Representante de los trabajadores 5/';
                doc.text(rep1, col3X + (col3LineX2-col3X-doc.getTextWidth(rep1))/2, lineY2+6);
                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                doc.text('Nombre y firma', col3X + (col3LineX2-col3X-doc.getTextWidth('Nombre y firma'))/2, lineY2+11);

                // ── PÁGINA 2: REVERSO (catálogos) ──
                doc.addPage();
                y = 15;
                doc.setFont('helvetica','bold'); doc.setFontSize(8);
                doc.text('CLAVES Y DENOMINACIONES DE ÁREAS Y SUBÁREAS DEL CATÁLOGO NACIONAL DE OCUPACIONES', M, y);
                y += 8;

                const occList = [
                    ['01','Cultivo, crianza y aprovechamiento','06','Transporte'],
                    ['01.1','Agricultura y silvicultura','06.1','Ferroviario'],
                    ['01.2','Ganadería','06.2','Autotransporte'],
                    ['01.3','Pesca y acuacultura','06.3','Aéreo'],
                    ['02','Extracción y suministro','06.4','Marítimo y fluvial'],
                    ['02.1','Exploración','06.5','Servicios de apoyo'],
                    ['02.2','Extracción','07','Provisión de bienes y servicios'],
                    ['02.3','Refinación y beneficio','07.1','Comercio'],
                    ['02.4','Provisión de energía','07.2','Alimentación y hospedaje'],
                    ['02.5','Provisión de agua','07.3','Turismo'],
                    ['03','Construcción','07.4','Deporte y esparcimiento'],
                    ['03.1','Planeación y dirección de obras','07.5','Servicios personales'],
                    ['03.2','Edificación y urbanización','07.6','Reparación de artículos domésticos'],
                    ['03.3','Acabado','07.7','Limpieza'],
                    ['03.4','Instalación y mantenimiento','07.8','Servicio postal y mensajería'],
                    ['04','Tecnología','08','Gestión y soporte administrativo'],
                    ['04.1','Mecánica','08.1','Bolsa, banca y seguros'],
                    ['04.2','Electricidad','08.2','Administración'],
                    ['04.3','Electrónica','08.3','Servicios legales'],
                    ['04.4','Informática','09','Salud y protección social'],
                    ['04.5','Telecomunicaciones','09.1','Servicios médicos'],
                    ['04.6','Procesos industriales','09.2','Inspección sanitaria y medio ambiente'],
                    ['05','Procesamiento y fabricación','09.3','Seguridad social'],
                    ['05.1','Minerales no metálicos','09.4','Protección de bienes y/o personas'],
                    ['05.2','Metales','10','Comunicación'],
                    ['05.3','Alimentos y bebidas','10.1','Publicación'],
                    ['05.4','Textiles y prendas de vestir','10.2','Radio, cine, televisión y teatro'],
                    ['05.5','Materia orgánica','10.3','Interpretación artística'],
                    ['05.6','Productos químicos','10.4','Traducción e interpretación lingüística'],
                    ['05.7','Productos metálicos y hule y plástico','10.5','Publicidad, propaganda y rel. públicas'],
                    ['05.8','Productos eléctricos y electrónicos','11','Desarrollo y extensión del conocimiento'],
                    ['05.9','Productos impresos','11.1','Investigación'],
                    ['','','11.2','Enseñanza'],
                    ['','','11.3','Difusión cultural']
                ];

                const col1W = 25, col2W = 75, col3W = 25, col4W = 75;
                doc.setFontSize(5); doc.setFont('helvetica','bold');
                drawTableRow(doc, M, y, col1W, 'CLAVE', col2W, 'DENOMINACIÓN', col3W, 'CLAVE', col4W, 'DENOMINACIÓN', 6);
                y += 7;
                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                occList.forEach(function(row) {
                    drawTableRow(doc, M, y, col1W, row[0], col2W, row[1], col3W, row[2], col4W, row[3], 5.5);
                    y += 5.5;
                });

                y += 6;
                doc.setFont('helvetica','bold'); doc.setFontSize(7);
                doc.text('CLAVES Y DENOMINACIONES DEL CATÁLOGO DE ÁREAS TEMÁTICAS DE LOS CURSOS', M, y);
                y += 8;

                const thematic = [
                    ['1000','Producción general','6000','Seguridad'],
                    ['2000','Servicios','7000','Desarrollo personal y familiar'],
                    ['3000','Administración, contabilidad y economía','8000','Tecnologías de la información y comunicación'],
                    ['4000','Comercialización','9000','Participación social'],
                    ['5000','Mantenimiento y reparación','','']
                ];
                doc.setFontSize(5); doc.setFont('helvetica','bold');
                drawTableRow(doc, M, y, col1W, 'CLAVE', col2W, 'DENOMINACIÓN', col3W, 'CLAVE', col4W, 'DENOMINACIÓN', 6);
                y += 7;
                doc.setFont('helvetica','normal'); doc.setFontSize(5);
                thematic.forEach(function(row) {
                    drawTableRow(doc, M, y, col1W, row[0], col2W, row[1], col3W, row[2], col4W, row[3], 5.5);
                    y += 5.5;
                });

                // Guardar PDF
                doc.save('DC3_' + (selectedWorker.curp || selectedWorker.name) + '.pdf');

                // Registrar en Supabase
                await sbInsert('dc3_records', {
                    worker_id:    selectedWorker.curp || '',
                    worker_name:  selectedWorker.name,
                    course_name:  courseName,
                    company_name: companyName,
                    start_date:   startDate,
                    end_date:     endDate,

                });

                showToast('✓ PDF generado y DC-3 registrado');
                document.getElementById('dc3-modal').style.display = 'none';
                await refreshCurrentView();

            } catch(err) {
                console.error('generateSingleDC3 error:', err);
                showToast('Error al generar PDF: ' + err.message, false);
            }
        }

        // ─── Utils ────────────────────────────────────────────────────
        function logout()     { currentUser = null; location.reload(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function deleteItem(table, id) {
            if (!confirm('¿Seguro que deseas eliminar este registro?')) return;
            const ok = await sbDelete(table, id);
            if (ok) { showToast('Eliminado correctamente'); await refreshCurrentView(); }
            else showToast('Error al eliminar', false);
        }

        async function handleExcel(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const wb   = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    if (!rows.length) { showToast('El archivo está vacío', false); return; }
                    const docs = rows.map(r => ({
                        name:      (r.Nombre   || r.NOMBRE   || r.nombre   || '').toString().trim(),
                        curp:      (r.CURP     || r.curp     || '').toString().trim().toUpperCase(),
                        position:  (r.Puesto   || r.PUESTO   || r.puesto   || '').toString().trim(),
                        occupation:(r.Ocupacion|| r.OCUPACION|| r.ocupacion|| '').toString().trim(),
                        creator_email: currentUser.email
                    })).filter(d => d.name);
                    if (!docs.length) { showToast('No se encontraron registros válidos', false); return; }
                    const ok = await sbInsertMany('workers', docs);
                    if (ok) { showToast('✓ ' + docs.length + ' trabajadores importados'); await refreshCurrentView(); }
                    else showToast('Error al importar', false);
                } catch (err) { showToast('Error al leer Excel: ' + err.message, false); }
            };
            reader.readAsArrayBuffer(input.files[0]);
            input.value = '';
        }
    </script>
