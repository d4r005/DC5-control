<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Control - Plataforma de Gestión DC3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 40%; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Pantalla de Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">ACE Control Login</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Correo electrónico" class="w-full p-3 border rounded">
                <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border rounded">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700">Entrar</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 text-center hidden">Credenciales incorrectas</p>
        </div>
    </div>

    <!-- Panel Principal -->
    <div id="main-panel" class="hidden flex h-screen">
        <!-- Sidebar -->
        <div class="bg-slate-900 text-white w-64 p-6 space-y-6">
            <h1 class="text-2xl font-bold border-b border-slate-700 pb-4">ACE Control</h1>
            <nav class="space-y-4">
                <a href="#" onclick="showSection('dashboard')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Dashboard</a>
                <a href="#" onclick="showSection('workers')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Personal (Excel)</a>
                <a href="#" onclick="showSection('courses')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Cursos</a>
                <a id="nav-agents" href="#" onclick="showSection('agents')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Agentes Capacitadores</a>
                <a id="nav-users" href="#" onclick="showSection('users')" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Gestión de Usuarios</a>
                <a href="#" onclick="logout()" class="block py-2.5 px-4 rounded transition hover:bg-red-900 text-red-400 mt-10">Cerrar Sesión</a>
            </nav>
        </div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800" id="section-title">Resumen</h2>
                <div class="flex space-x-2">
                    <button id="add-btn" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700 hidden" onclick="openModal()">+ Agregar Nuevo</button>
                </div>
            </header>

            <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
                <!-- Stats -->
                <div id="stats-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                        <h3 class="text-gray-500 text-sm font-medium">Personal Registrado</h3>
                        <p class="text-3xl font-bold text-gray-800" id="stat-workers">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
                        <h3 class="text-gray-500 text-sm font-medium">Cursos</h3>
                        <p class="text-3xl font-bold text-gray-800" id="stat-courses">0</p>
                    </div>
                </div>

                <!-- Table Content -->
                <div class="bg-white shadow-md rounded-lg overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50" id="table-header"></thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200 text-sm"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-4" id="modal-title">Agregar</h3>
            <div id="modal-fields" class="space-y-4"></div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600">Cancelar</button>
                <button onclick="saveItem()" class="px-4 py-2 bg-blue-600 text-white rounded">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const ATLAS_URL = "https://data.mongodb-api.com/app/data-jshze/endpoint/data/v1/action";
        const API_KEY = "al-b14XHfG6V17yJMOy1lmUWm9vCbuLZG1-Ot7Mp0YAMhH";
        const DB_CONFIG = { dataSource: "acecontrol", database: "DC3_Database" };

        let currentUser = null;
        let currentSection = 'dashboard';
        let editingItemId = null;

        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(email === 'd4r005@gmail.com' && pass === 'Branco 2025') {
                currentUser = { email, role: 'ADMIN', name: 'Administrador' };
                initApp();
                return;
            }

            const data = await atlasAction("findOne", "users", { filter: { email, password: pass } });
            if(data.document) {
                currentUser = data.document;
                initApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function initApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');

            if(currentUser.role !== 'ADMIN') {
                document.getElementById('nav-users').classList.add('hidden');
                document.getElementById('nav-agents').classList.add('hidden');
            }
            showSection('dashboard');
        }

        function logout() { location.reload(); }

        async function atlasAction(action, collection, payload = {}) {
            const response = await fetch(`${ATLAS_URL}/${action}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "api-key": API_KEY },
                body: JSON.stringify({ ...DB_CONFIG, collection, ...payload })
            });
            return await response.json();
        }

        async function showSection(section) {
            currentSection = section;
            const btn = document.getElementById('add-btn');
            btn.classList.add('hidden');
            document.getElementById('stats-container').classList.add('hidden');

            if(section === 'dashboard') {
                document.getElementById('stats-container').classList.remove('hidden');
                fetchStats();
            } else if(section === 'workers') {
                fetchWorkers();
            } else if(section === 'courses') {
                btn.classList.remove('hidden');
                fetchCourses();
            } else if(section === 'agents') {
                btn.classList.remove('hidden');
                fetchAgents();
            } else if(section === 'users') {
                btn.classList.remove('hidden');
                fetchUsers();
            }
        }

        async function fetchStats() {
            const filter = currentUser.role === 'ADMIN' ? {} : { creatorEmail: currentUser.email };
            const workers = await atlasAction("find", "workers", { filter });
            const courses = await atlasAction("find", "courses", { filter });
            document.getElementById('stat-workers').innerText = workers.documents.length;
            document.getElementById('stat-courses').innerText = courses.documents.length;
        }

        async function fetchWorkers() {
            document.getElementById('section-title').innerText = "Personal";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Nombre</th><th class="px-6 py-3 text-left">CURP</th><th class="px-6 py-3 text-left">Puesto</th></tr>`;
            const filter = currentUser.role === 'ADMIN' ? {} : { creatorEmail: currentUser.email };
            const data = await atlasAction("find", "workers", { filter });
            renderTable(data.documents, ['name', 'curp', 'position']);
        }

        async function fetchCourses() {
            document.getElementById('section-title').innerText = "Cursos";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Curso</th><th class="px-6 py-3 text-left">Horas</th><th class="px-6 py-3 text-left">Área</th><th class="px-6 py-3 text-left">Acciones</th></tr>`;
            const filter = currentUser.role === 'ADMIN' ? {} : { creatorEmail: currentUser.email };
            const data = await atlasAction("find", "courses", { filter });
            const html = data.documents.map(c => `<tr>
                <td class="px-6 py-4">${c.name}</td>
                <td class="px-6 py-4">${c.durationHours}</td>
                <td class="px-6 py-4">${c.thematicArea}</td>
                <td class="px-6 py-4 space-x-2">
                    <button onclick='editCourse(${JSON.stringify(c)})' class="text-blue-600">Editar</button>
                    <button onclick="deleteItem('courses', '${c._id}')" class="text-red-600">Eliminar</button>
                </td>
            </tr>`).join('');
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">No hay datos.</td></tr>';
        }

        async function fetchUsers() {
            document.getElementById('section-title').innerText = "Gestión de Usuarios";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Nombre</th><th class="px-6 py-3 text-left">Email</th><th class="px-6 py-3 text-left">Rol</th><th class="px-6 py-3 text-left">Acciones</th></tr>`;
            const data = await atlasAction("find", "users", { filter: {} });
            const html = data.documents.map(u => `<tr>
                <td class="px-6 py-4">${u.name}</td>
                <td class="px-6 py-4">${u.email}</td>
                <td class="px-6 py-4">${u.role}</td>
                <td class="px-6 py-4 space-x-2">
                    <button onclick='editUser(${JSON.stringify(u)})' class="text-blue-600">Editar</button>
                    <button onclick="deleteItem('users', '${u._id}')" class="text-red-600">Eliminar</button>
                </td>
            </tr>`).join('');
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">No hay datos.</td></tr>';
        }

        async function fetchAgents() {
            document.getElementById('section-title').innerText = "Agentes Capacitadores";
            document.getElementById('table-header').innerHTML = `<tr><th class="px-6 py-3 text-left">Nombre</th><th class="px-6 py-3 text-left">Registro STPS</th><th class="px-6 py-3 text-left">Acciones</th></tr>`;
            const data = await atlasAction("find", "agents", { filter: {} });
            const html = data.documents.map(a => `<tr>
                <td class="px-6 py-4">${a.name}</td>
                <td class="px-6 py-4">${a.stpsRegistry}</td>
                <td class="px-6 py-4 space-x-2">
                    <button onclick='editAgent(${JSON.stringify(a)})' class="text-blue-600">Editar</button>
                    <button onclick="deleteItem('agents', '${a._id}')" class="text-red-600">Eliminar</button>
                </td>
            </tr>`).join('');
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="3" class="p-4 text-center">No hay datos.</td></tr>';
        }

        function renderTable(data, keys) {
            let html = data.map(item => `<tr>${keys.map(k => `<td class="px-6 py-4">${item[k] || ''}</td>`).join('')}</tr>`).join('');
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="3" class="p-4 text-center">No hay datos.</td></tr>';
        }

        function openModal() {
            editingItemId = null;
            const fields = document.getElementById('modal-fields');
            document.getElementById('modal-title').innerText = "Agregar";

            if(currentSection === 'users') {
                fields.innerHTML = `
                    <input id="u-name" placeholder="Nombre completo" class="w-full p-2 border">
                    <input id="u-email" placeholder="Email" class="w-full p-2 border">
                    <input id="u-pass" type="password" placeholder="Contraseña" class="w-full p-2 border">
                    <select id="u-role" class="w-full p-2 border"><option value="USER">Agente Capacitador</option><option value="ADMIN">Administrador</option></select>
                `;
            } else if(currentSection === 'courses') {
                fields.innerHTML = `<input id="c-name" placeholder="Nombre del curso" class="w-full p-2 border"><input id="c-hours" placeholder="Horas" class="w-full p-2 border"><input id="c-area" placeholder="Área temática" class="w-full p-2 border">`;
            } else if(currentSection === 'agents') {
                fields.innerHTML = `<input id="a-name" placeholder="Nombre completo" class="w-full p-2 border"><input id="a-reg" placeholder="Registro STPS" class="w-full p-2 border">`;
            }
            document.getElementById('modal').style.display = 'block';
        }

        function editUser(u) {
            openModal();
            editingItemId = u._id;
            document.getElementById('modal-title').innerText = "Editar Usuario";
            document.getElementById('u-name').value = u.name;
            document.getElementById('u-email').value = u.email;
            document.getElementById('u-pass').value = u.password;
            document.getElementById('u-role').value = u.role;
        }

        function editCourse(c) {
            openModal();
            editingItemId = c._id;
            document.getElementById('modal-title').innerText = "Editar Curso";
            document.getElementById('c-name').value = c.name;
            document.getElementById('c-hours').value = c.durationHours;
            document.getElementById('c-area').value = c.thematicArea;
        }

        function editAgent(a) {
            openModal();
            editingItemId = a._id;
            document.getElementById('modal-title').innerText = "Editar Agente";
            document.getElementById('a-name').value = a.name;
            document.getElementById('a-reg').value = a.stpsRegistry;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function saveItem() {
            let collection = "";
            let documentData = {};

            if(currentSection === 'users') {
                collection = "users";
                documentData = { name: document.getElementById('u-name').value, email: document.getElementById('u-email').value, password: document.getElementById('u-pass').value, role: document.getElementById('u-role').value };
            } else if(currentSection === 'courses') {
                collection = "courses";
                documentData = { name: document.getElementById('c-name').value, durationHours: parseInt(document.getElementById('c-hours').value), thematicArea: document.getElementById('c-area').value, creatorEmail: currentUser.email };
            } else if(currentSection === 'agents') {
                collection = "agents";
                documentData = { name: document.getElementById('a-name').value, stpsRegistry: document.getElementById('a-reg').value };
            }

            if (editingItemId) {
                await atlasAction("updateOne", collection, { filter: { _id: { "$oid": editingItemId } }, update: { "$set": documentData } });
            } else {
                await atlasAction("insertOne", collection, { document: documentData });
            }

            closeModal();
            showSection(currentSection);
        }

        async function deleteItem(collection, id) {
            if(confirm("¿Seguro que deseas eliminar este elemento?")) {
                await atlasAction("deleteOne", collection, { filter: { _id: { "$oid": id } } });
                showSection(currentSection);
            }
        }
    </script>
</body>
</html>
