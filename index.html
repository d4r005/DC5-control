                document.getElementById('email').value = localStorage.getItem('rememberedEmail');
        };

        function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const user = USERS.find(u => u.email === email && u.password === pass);

                if (document.getElementById('remember-me').checked)
                    localStorage.setItem('rememberedEmail', email);
                currentUser = user;
                initApp();
            } else {
                document.getElementById('login-error').classList.remove('hidden');

            document.getElementById('app-container').classList.remove('hidden');

        function getFilter() {
            const v = document.getElementById('user-filter').value;
            if (currentUser.role === 'ADMIN' && v === 'ALL') return null;
            return v === 'ALL' ? currentUser.email : v;
        }

        async function switchView(v) {
            currentView = v;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + v);
            if (btn) btn.classList.add('active');
            const titles = { dashboard:'Dashboard', workers:'Personal', companies:'Empresas', courses:'Cursos', agents:'Agentes Capacitadores', dc3:'DC-3 Generados', users:'Usuarios' };
            document.getElementById('page-title').innerText = titles[v] || v;
            document.getElementById('view-dashboard').classList.toggle('hidden', v !== 'dashboard');
            document.getElementById('view-content').classList.toggle('hidden', v === 'dashboard');
            document.getElementById('upload-btn').classList.toggle('hidden', v !== 'workers');
            document.getElementById('add-btn').classList.toggle('hidden', !['courses','agents','companies','workers'].includes(v));
            await refreshCurrentView();
            lucide.createIcons();
        }

        // =============================================
        // SUPABASE DATA FUNCTIONS
        // =============================================

        async function sbSelect(table, filter) {
            let q = sb.from(table).select('*');
            if (filter) q = q.eq('creator_email', filter);
            const { data, error } = await q.order('created_at', { ascending: false });
            if (error) { console.error('sbSelect error:', error); return []; }
            return data || [];
        }

        async function sbInsert(table, doc) {
            const { data, error } = await sb.from(table).insert(doc).select();
            if (error) { console.error('sbInsert error:', error); return null; }
            return data;
        }

        async function sbDelete(table, id) {
            const { error } = await sb.from(table).delete().eq('id', id);
            if (error) console.error('sbDelete error:', error);
            return !error;
        }

        async function sbInsertMany(table, docs) {
            const { data, error } = await sb.from(table).insert(docs);
            if (error) { console.error('sbInsertMany error:', error); return false; }
            return true;
        }

        // =============================================
        // REFRESH VIEWS
        // =============================================

        async function refreshCurrentView() {
            const f = getFilter();

            if (currentView === 'dashboard') {
                const [workers, dc3recs, courses] = await Promise.all([
                    sbSelect('workers', f),
                    sbSelect('dc3_records', f),
                    sbSelect('courses', f)
                ]);
                document.getElementById('stat-workers').innerText = workers.length;
                document.getElementById('stat-dc3').innerText = dc3recs.length;
                document.getElementById('stat-courses').innerText = courses.length;

            } else if (currentView === 'workers') {
                const data = await sbSelect('workers', f);
                document.getElementById('table-header').innerHTML = '<tr><th class="p-6 text-left">Nombre</th><th class="p-6 text-left">CURP</th><th class="p-6 text-left">Puesto</th><th class="p-6 text-right">Acciones</th></tr>';

                    ? data.map(x => `<tr class="hover:bg-slate-50 border-b"><td class="p-5 font-bold">${x.name}</td><td class="p-5">${x.curp || ''}</td><td class="p-5">${x.position || ''}</td><td class="p-5 text-right space-x-3"><button onclick='openDC3Modal(${JSON.stringify(x)})' class="text-blue-600 font-bold hover:underline">Generar DC-3</button><button onclick="deleteItem('workers','${x.id}')" class="text-red-400 font-bold hover:underline">Eliminar</button></td></tr>`).join('')
                    : '<tr><td colspan="4" class="p-10 text-center text-slate-400">Sin personal registrado</td></tr>';

            } else if (currentView === 'companies') {
                allCompanies = await sbSelect('companies', null);
                document.getElementById('table-header').innerHTML = '<tr><th class="p-6 text-left">Empresa</th><th class="p-6 text-left">RFC</th><th class="p-6 text-right">Acciones</th></tr>';
                document.getElementById('table-body').innerHTML = allCompanies.length
                    ? allCompanies.map(c => `<tr class="hover:bg-slate-50 border-b"><td class="p-5 font-bold">${c.name}</td><td class="p-5">${c.rfc || ''}</td><td class="p-5 text-right"><button onclick="deleteItem('companies','${c.id}')" class="text-red-400 font-bold hover:underline">Eliminar</button></td></tr>`).join('')
                    : '<tr><td colspan="3" class="p-10 text-center text-slate-400">Sin empresas registradas</td></tr>';

            } else if (currentView === 'courses') {
                const data = await sbSelect('courses', f);
                document.getElementById('table-header').innerHTML = '<tr><th class="p-6 text-left">Curso</th><th class="p-6 text-left">Horas</th><th class="p-6 text-right">Acciones</th></tr>';
                document.getElementById('table-body').innerHTML = data.length
                    ? data.map(c => `<tr class="hover:bg-slate-50 border-b"><td class="p-5 font-bold uppercase">${c.name}</td><td class="p-5 font-bold text-blue-600">${c.duration_hours} H</td><td class="p-5 text-right"><button onclick="deleteItem('courses','${c.id}')" class="text-red-400 font-bold hover:underline">Eliminar</button></td></tr>`).join('')
                    : '<tr><td colspan="3" class="p-10 text-center text-slate-400">Sin cursos</td></tr>';

            } else if (currentView === 'agents') {
                const data = await sbSelect('agents', f);
                document.getElementById('table-header').innerHTML = '<tr><th class="p-6 text-left">Agente</th><th class="p-6 text-left">Registro STPS</th><th class="p-6 text-right">Acciones</th></tr>';
                document.getElementById('table-body').innerHTML = data.length
                    ? data.map(a => `<tr class="hover:bg-slate-50 border-b"><td class="p-5 font-bold uppercase">${a.name}</td><td class="p-5 font-bold">${a.stps || ''}</td><td class="p-5 text-right"><button onclick="deleteItem('agents','${a.id}')" class="text-red-400 font-bold hover:underline">Eliminar</button></td></tr>`).join('')
                    : '<tr><td colspan="3" class="p-10 text-center text-slate-400">Sin agentes</td></tr>';

            } else if (currentView === 'dc3') {
                const data = await sbSelect('dc3_records', f);
                document.getElementById('table-header').innerHTML = '<tr><th class="p-6 text-left">Trabajador</th><th class="p-6 text-left">Curso</th><th class="p-6 text-left">Empresa</th><th class="p-6 text-left">Fecha Inicio</th></tr>';
                document.getElementById('table-body').innerHTML = data.length
                    ? data.map(d => `<tr class="hover:bg-slate-50 border-b"><td class="p-5 font-bold">${d.worker_name || d.worker_id || ''}</td><td class="p-5">${d.course_name || ''}</td><td class="p-5">${d.company_name || ''}</td><td class="p-5">${d.start_date || ''}</td></tr>`).join('')
                    : '<tr><td colspan="4" class="p-10 text-center text-slate-400">Sin DC-3 generados</td></tr>';
            }
        }

        // =============================================
        // MODAL / SAVE
        // =============================================

        function openModal() {
            const fields = document.getElementById('modal-fields');
            document.getElementById('modal').style.display = 'block';

            if (currentView === 'companies') {
                document.getElementById('modal-title').innerText = "Nueva Empresa";
                fields.innerHTML = `<input id="f1" placeholder="Nombre de la empresa" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><input id="f2" placeholder="RFC" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400">`;
            } else if (currentView === 'workers') {
                document.getElementById('modal-title').innerText = "Nuevo Trabajador";
                const occ = CATALOGS.occupations.map(o => `<option value="${o}">${o}</option>`).join('');
                fields.innerHTML = `<input id="f1" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><input id="f2" placeholder="CURP" maxlength="18" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><select id="f3" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><option value="">-- Seleccionar Ocupación --</option>${occ}</select><input id="f4" placeholder="Puesto" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400">`;
            } else if (currentView === 'courses') {
                document.getElementById('modal-title').innerText = "Nuevo Curso";
                fields.innerHTML = `<input id="f1" placeholder="Nombre del curso" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><input id="f2" type="number" min="1" value="8" placeholder="Duración en horas" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400">`;
            } else if (currentView === 'agents') {
                document.getElementById('modal-title').innerText = "Nuevo Agente Capacitador";
                fields.innerHTML = `<input id="f1" placeholder="Nombre del agente" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400"><input id="f2" placeholder="Registro STPS" class="w-full p-4 bg-slate-50 rounded-xl text-slate-900 font-bold outline-none border border-transparent focus:border-blue-400">`;
            }
            setTimeout(() => { const f1 = document.getElementById('f1'); if (f1) f1.focus(); }, 100);
        }

        async function saveItem() {
            let doc = {}, table = "";

            if (currentView === 'companies') {
                const name = document.getElementById('f1').value.trim();
                const rfc = document.getElementById('f2').value.trim();
                if (!name || !rfc) { showToast("Completa todos los campos", false); return; }
                table = 'companies'; doc = { name, rfc, creator_email: currentUser.email };

            } else if (currentView === 'workers') {
                const name = document.getElementById('f1').value.trim();
                const curp = document.getElementById('f2').value.trim().toUpperCase();
                const occ = document.getElementById('f3').value;
                const pos = document.getElementById('f4').value.trim();
                if (!name || !curp || !occ || !pos) { showToast("Completa todos los campos", false); return; }
                table = 'workers'; doc = { name, curp, occupation: occ, position: pos, creator_email: currentUser.email };

            } else if (currentView === 'courses') {
                const name = document.getElementById('f1').value.trim();
                const hours = parseInt(document.getElementById('f2').value) || 0;
                if (!name || hours < 1) { showToast("Ingresa nombre y horas válidas", false); return; }
                table = 'courses'; doc = { name: name.toUpperCase(), duration_hours: hours, creator_email: currentUser.email };

            } else if (currentView === 'agents') {
                const name = document.getElementById('f1').value.trim();
                const stps = document.getElementById('f2').value.trim();
                if (!name || !stps) { showToast("Completa todos los campos", false); return; }
                table = 'agents'; doc = { name: name.toUpperCase(), stps, creator_email: currentUser.email };
            }

            if (!table) { showToast("Vista no reconocida", false); return; }

            const result = await sbInsert(table, doc);
            if (result) {
                showToast("✓ Guardado correctamente");
                closeModal();
                await refreshCurrentView();
            } else {
                showToast("Error al guardar en Supabase", false);
            }
        }

        // =============================================
        // DC-3
        // =============================================

        async function openDC3Modal(worker) {
            selectedWorker = worker;
            document.getElementById('dc3-worker-name').innerText = worker.name;

            // Cargar empresas y cursos
            if (allCompanies.length === 0)
                allCompanies = await sbSelect('companies', null);
            const courses = await sbSelect('courses', getFilter());

            document.getElementById('dc3-company').innerHTML = allCompanies.length
                ? allCompanies.map(c => `<option value="${c.name}">${c.name}</option>`).join('')
                : '<option value="">-- Sin empresas --</option>';
            document.getElementById('dc3-course').innerHTML = courses.length
                ? courses.map(c => `<option value="${c.name}">${c.name}</option>`).join('')
                : '<option value="">-- Sin cursos --</option>';
            document.getElementById('dc3-modal').style.display = 'block';
        }

        async function generateSingleDC3() {
            const companyName = document.getElementById('dc3-company').value;
            const courseName = document.getElementById('dc3-course').value;
            const startDate = document.getElementById('dc3-start').value;
            const endDate = document.getElementById('dc3-end').value;

            if (!companyName || !courseName || !startDate || !endDate) {
                showToast("Completa todos los campos del DC-3", false);
                return;
            }

            // Generar PDF
            const doc = new jspdf.jsPDF();
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(14);
            doc.text("FORMATO DC-3", 105, 20, null, null, "center");
            doc.setFontSize(9);
            doc.text("CONSTANCIA DE COMPETENCIAS O DE HABILIDADES LABORALES", 105, 28, null, null, "center");
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text(`Trabajador: ${selectedWorker.name}`, 20, 45);
            doc.text(`CURP: ${selectedWorker.curp || ''}`, 20, 52);
            doc.text(`Puesto: ${selectedWorker.position || ''}`, 20, 59);
            doc.text(`Ocupacion: ${selectedWorker.occupation || ''}`, 20, 66);
            doc.line(20, 70, 190, 70);
            doc.text(`Empresa: ${companyName}`, 20, 78);
            doc.line(20, 82, 190, 82);
            doc.text(`Curso: ${courseName}`, 20, 90);
            doc.text(`Periodo: ${startDate} al ${endDate}`, 20, 97);
            doc.line(20, 250, 80, 250);
            doc.text("Instructor / Tutor", 30, 257);
            doc.line(90, 250, 150, 250);
            doc.text("Patron o Rep. Legal", 97, 257);
            doc.save(`DC3_${selectedWorker.curp || selectedWorker.name}.pdf`);

            // Guardar registro en Supabase
            await sbInsert('dc3_records', {
                worker_id: selectedWorker.curp || '',
                worker_name: selectedWorker.name,
                course_name: courseName,
                company_name: companyName,
                start_date: startDate,
                end_date: endDate,
                creator_email: currentUser.email
            });

            showToast("✓ PDF generado y registrado en Supabase");
            document.getElementById('dc3-modal').style.display = 'none';
            await refreshCurrentView();
        }

        // =============================================
        // UTILS
        // =============================================

        function logout() { currentUser = null; location.reload(); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function deleteItem(table, id) {
            if (!confirm("¿Seguro que deseas eliminar este registro?")) return;
            const ok = await sbDelete(table, id);
            if (ok) { showToast("Eliminado correctamente"); await refreshCurrentView(); }
            else showToast("Error al eliminar", false);
        }

        async function handleExcel(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    if (!rows.length) { showToast("El archivo está vacío", false); return; }

                    const docs = rows.map(r => ({
                        name: r.Nombre || r.NOMBRE || r.nombre || '',
                        curp: r.CURP || r.curp || '',
                        position: r.Puesto || r.PUESTO || r.puesto || '',
                        occupation: r.Ocupacion || r.OCUPACION || r.ocupacion || '',
                        creator_email: currentUser.email
                    })).filter(d => d.name);

                    if (!docs.length) { showToast("No se encontraron datos válidos", false); return; }

                    const ok = await sbInsertMany('workers', docs);
                    if (ok) {
                        showToast(`✓ ${docs.length} trabajadores importados a Supabase`);
                        await refreshCurrentView();
                    } else {
                        showToast("Error al importar a Supabase", false);
                    }
                } catch (err) {
                    showToast("Error al leer Excel: " + err.message, false);
                }
            };
            reader.readAsArrayBuffer(input.files[0]);
        }
    </script>
